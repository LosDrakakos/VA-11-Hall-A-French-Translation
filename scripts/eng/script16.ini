l_11 = "[XS:gilface,surprise][XS:giltalk,1][C:19]Gillian:[C:C] Oh?"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] Let's go a bit back first.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] You do know why Cat Boomers look #like that, right?[STOPLIP:]"
l_14 = "[XS:gilface,][XS:giltalk,1][C:19]Gillian:[C:C] Because they went through some #anti-Nanomachine Rejection treatment #while they were still a fetus, right?[STOPLIP:]"
