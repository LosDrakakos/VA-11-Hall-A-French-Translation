l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] Or was it the Romanenko-Yamada #treatment?[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] The Roma...[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...let's call it the Catification #procedure.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] It was not only the first successful #genetic treatment on a fetus, but also the #first way to fight Nanomachine Rejection.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] Moreover, that research had a bit of #a rocky story.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Funding got cut in the middle of it, #at a critical point that could make or break #the whole thing.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] Not to mention Zaibatsu Corp's record #of not addressing Nanomachine Rejection at #all.[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] The rest of the research was funded by #Mackie Stengovich.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Was it Stengovich? Let's call #him Stengovich for now.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] He's a businessman whose unborn #daughter got diagnosed with early #Nanomachine Rejection.[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Stengovich funded the research. And in #a desperate move, his wife offered herself #and her daughter as test subjects.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] Of course, the experiment was a #success. [STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] The girl, Silvia Stengovich, didn't #die. She became the living testament of a #scientific breakthrough.[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] But then, the story of how things #played out for Silvia got sensationalized #in the media and created a weird fad.[STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] Parents made their unborn children go #through the Catification procedure, even if #they had no ailments at all.[STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] All because one particular girl whose #life got saved through that treatment became #a media darling for a bit.[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] A whole generation of kids with those #cat-like protrusions got born."
