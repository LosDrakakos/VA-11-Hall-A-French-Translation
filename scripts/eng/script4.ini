l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Last time you came, you mentioned #something about going haywire.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] What did you mean? I'm intrigued.[STOPLIP:]"
l_3 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Have you ever felt like your sanity #has slipped right by you?[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, a client earlier tonight was #driving me nuts, but aside from that... #no.[STOPLIP:]"
l_5 = "[XS:jamieface,shy][XS:jamietalk,1][C:23]Jamie:[C:C] Truth be told, neither have I. But #I'm afraid of it happening.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] How so?[STOPLIP:]"
l_7 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I don't know. I just have the #lingering fear that at some point #I won't be myself.[STOPLIP:]"
l_8 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I'll go crazy, I'll wake up a #stranger to myself and I won't care...[STOPLIP:]"
l_9 = "[XS:jamietalk,1][C:23]Jamie:[C:C] It's just an irrational fear that #lingers in me and there's nothing I can do #about it.[STOPLIP:]"
l_10 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Like the fear of cockroaches for some #people.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Only instead of fearing a crawling #nuisance, you fear lunacy...[STOPLIP:]"
l_12 = "[XS:jamieface,][XS:jamietalk,1][C:23]Jamie:[C:C] Something like that.[STOPLIP:]"
l_13 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Sometimes I wonder if uploading my #brain would solve all those problems.[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, that technology is still a ways #off.[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] I've heard of a couple of experiments #regarding the technology, but it seems #everything's still too buggy.[STOPLIP:]"
l_16 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I'll have to wait until it's safe, #then...[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Until then, don't worry too much about #those possibilities unless they're tangible #enough.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Otherwise, you're no better than a #hypochondriac.[STOPLIP:]"
l_19 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Good point.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] The way you said it makes it sound #less like something you feel might happen.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Something you're just afraid COULD #happen at some point.[STOPLIP:]"
l_22 = "[XS:jamietalk,1][C:23]Jamie:[C:C] That's pretty much it, yeah.[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] Doesn't that make you saner? I mean...[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Were you really on your way to #becoming an unhinged maniac, I don't know if #you'd think about it at all.[STOPLIP:]"
l_25 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Hm... you might have a point there.[XS:ph,11][E:67][STOPLIP:]"
