l_16 = "[XS:jamietalk,1][C:23]Jamie:[C:C] J'attendrais jusqu'à ce que ça soit sûr #alors...[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Jusqu'à là, ne pensez pas trop à la #possibilité de virer dingue mise à part si elle #sont suffisamment tangible.[STOPLIP:]"
