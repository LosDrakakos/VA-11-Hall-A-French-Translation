l_1 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Jill, have you ever thought about #brain uploading?[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] Brain uploading?[STOPLIP:]"
l_3 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I was thinking, what's the point of #uploading yourself if you're still INI_QUOTShereINI_QUOTS?[STOPLIP:]"
l_4 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Let's say you upload yourself and, #effectively, that new someone's in #cyberspace. You will still be INI_QUOTShereINI_QUOTS.[STOPLIP:]"
l_5 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Wouldn't it be weird to know that #there's a you that's not you somewhere?[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's... an interesting point.[STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] I guess it'd be the same as cloning, #huh? Imagine if your cyberspace self #found out about the real you, somehow.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hell, imagine talking to your other #self.[STOPLIP:]"
l_9 = "[XS:jamietalk,1][C:23]Jamie:[C:C] There's more. Imagine placing multiple #copies of you in different situations.[STOPLIP:]"
l_10 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Exposing each one to different #scenarios to see how they develop.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] I guess it is kind of heartbreaking #in a way.[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] Imagine someone with some illness #uploading their brain into the ether. [STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Only to find out their physical bodies #are still alive and INI_QUOTShere,INI_QUOTS instead of #living in a place where there is no disease.[STOPLIP:]"
l_14 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I remember an article from a while #back about the earliest forms of brain #uploading. [STOPLIP:]"
l_15 = "[XS:jamietalk,1][C:23]Jamie:[C:C] It would scan the brain in such a #thorough and intense manner that it would #effectively kill the person.[STOPLIP:]"
l_16 = "[XS:jamietalk,1][C:23]Jamie:[C:C] It used the words INI_QUOTSburn the brainINI_QUOTS.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Ouch...[STOPLIP:]"
l_18 = "[XS:jamietalk,1][C:23]Jamie:[C:C] All for nothing because the data would #be corrupted or broken.[STOPLIP:]"
l_19 = "[XS:jamietalk,1][C:23]Jamie:[C:C] They halted all brain uploading #research after that.[STOPLIP:]"
l_20 = "[XS:jamietalk,1][C:23]Jamie:[C:C] I think they started another project #about living brains in jars or something #after that.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] That subject interests you, huh?[STOPLIP:]"
