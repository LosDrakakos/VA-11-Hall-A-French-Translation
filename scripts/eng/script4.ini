l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] La dernière fois que vous êtes venu, vous #avez parlé de INI_QUOTSpartir en vrilleINI_QUOTS.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] Que vouliez-vous dire? Je suis intrigué.[STOPLIP:]"
l_3 = "[XS:jamietalk,1][C:23]Jamie:[C:C] As-tu déjà eu cette impression que ta santé #mentale échappait à ton contrôle?[STOPLIP:]"
