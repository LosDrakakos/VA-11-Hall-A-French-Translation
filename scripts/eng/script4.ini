l_9 = "[XS:jamietalk,1][C:23]Jamie:[C:C] C'est juste une peur irrationnelle qui #persiste et je ne peux rien faire pour la calmer.[STOPLIP:]"
l_10 = "[XS:jamietalk,1][C:23]Jamie:[C:C] C'est comme la peur des cafards chez #certain.[STOPLIP:]"
