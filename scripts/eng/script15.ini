l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...?[STOPLIP:]"
l_13 = "[XS:seiface,pain][XS:seitalk,1][C:17]Sei:[C:C] ...he gouged Stella's eye out.[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...![STOPLIP:]"
l_15 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] I tried to stop him, but he just went #and kicked me.[STOPLIP:]"
l_16 = "[XS:seiface,pain][XS:seitalk,1][C:17]Sei:[C:C] I still remember that kick. I could #feel my ribs breaking. There was pain in #places I didn't know could feel pain.[STOPLIP:]"
l_17 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] From time to time, I still relive #that day. [STOPLIP:]"
l_18 = "[XS:seitalk,1][C:17]Sei:[C:C] The kick in my torso, Stella's #screams. It's... it's chilling.[STOPLIP:]"
l_19 = "[XS:seitalk,1][C:17]Sei:[C:C] I briefly regained consciousness #after the kick, when I felt like I was #being lifted.[STOPLIP:]"
l_20 = "[XS:seitalk,1][C:17]Sei:[C:C] The White Knight that attacked us was #on the floor, not moving.[STOPLIP:]"
l_21 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] I was on another White Knight's #shoulder. He took his helmet off and put #it on an anguished Stella.[STOPLIP:]"
