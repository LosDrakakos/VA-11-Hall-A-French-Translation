[16]
l_1 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] So, how are you treating my old armor?[STOPLIP:]"
l_2 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] I think they're treating it well. [STOPLIP:]"
l_3 = "[XS:steltalk,1][C:16]Stella:[C:C] Cracking through it hasn't been #easy though.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] What's this about the armor?[STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] Stella knows of a medical researcher #that wanted to see the systems embedded #inside the White Knight armor.[STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] Apparently he wants to use them in #conjunction with some mods to help with #treatments and recovery.[STOPLIP:]"
l_7 = "[XS:seitalk,1][C:17]Sei:[C:C] I can see why. That armor had some #support systems that got me out of a #pinch when I was injured.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] Also, did you say INI_QUOTScrack throughINI_QUOTS?[STOPLIP:]"
l_9 = "[XS:steltalk,1][C:16]Stella:[C:C] The armor is... um... locked.[STOPLIP:]"
l_10 = "[XS:steltalk,1][C:16]Stella:[C:C] As a countermeasure against the #rogue agents that caused havoc the other #day, Zaibatsu Corp deactivated them.[STOPLIP:]"
l_11 = "[XS:steltalk,1][C:16]Stella:[C:C] It was a remote safeguard nobody #knew about, apparently.[STOPLIP:]"
l_12 = "[XS:steltalk,1][C:16]Stella:[C:C] All systems were shut down, and #they couldn't be started manually.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Is that the thing people mentioned #about the White Knights stopping in their #tracks?[STOPLIP:]"
l_14 = "[XS:steltalk,1][C:16]Stella:[C:C] Yup.[STOPLIP:]"
l_15 = "[XS:steltalk,1][C:16]Stella:[C:C] Many of the trouble-makers got #caught because the system wouldn't even #let them move.[STOPLIP:]"
l_16 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] Besides, if we can #reverse-engineer the whole suit, we #might...[STOPLIP:]"
l_17 = "[XS:steltalk,1][C:16]Stella:[C:C] ...[STOPLIP:]"
l_18 = "[XS:steltalk,1][C:16]Stella:[C:C] Hm...[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] Um...[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] We're having a New Year's party this #Saturday. Do you wanna come?[STOPLIP:]"
l_21 = "[XS:stelface,happy][XS:steltalk,1][C:16]Stella:[C:C] Sure. That'd be a nice change of #pace.[STOPLIP:]"
