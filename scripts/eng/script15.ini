l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] I feel you shouldn't tell me that.[STOPLIP:]"
l_5 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] She told you my story - means she #likes you enough. It's fine.[STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] You remember when I told you one #White Knight saved me from another?[STOPLIP:]"
