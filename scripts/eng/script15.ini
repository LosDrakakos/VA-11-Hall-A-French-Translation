l_9 = "[XS:seitalk,1][C:17]Sei:[C:C] She got over it. But the gifting #stuck to her.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] INI_QUOTSSpiritual reincarnationINI_QUOTS?[STOPLIP:]"
l_11 = "[XS:seitalk,1][C:17]Sei:[C:C] Well, the story says the Redmond #family destroyed Santa's spirit.[STOPLIP:]"
