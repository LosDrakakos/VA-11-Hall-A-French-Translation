l_1 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Hey Jill, this might seem a bit #random, but...[STOPLIP:]"
l_2 = "[XS:seitalk,1][C:17]Sei:[C:C] Do you remember the first time I came #here?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, you're the second White Knight #I've served.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] I remember. Why?[STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] Precisely because of that.[STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] I've been meaning to ask you about #that story. How was your other experience #with a White Knight?[STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] If I had to put it simply... the #total opposite of you.[STOPLIP:]"
l_8 = "[XS:seitalk,1][C:17]Sei:[C:C] Oh?[STOPLIP:]"
l_9 = "[XS:jilltalk,1][C:13]Jill:[C:C] She came here as part of her work. #Looking for information on some case.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] I went through the motions, offering #her a drink and all that. But she came #only for her job.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] At first I thought she was just #another private eye, but she showed me her #badge and all.[STOPLIP:]"
l_12 = "[XS:seitalk,1][C:17]Sei:[C:C] What kind of case was it?[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hm... I wouldn't know...[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] She never told me, but she asked if #I saw some people.[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] She got pretty intense when I told #her I had no idea who she was talking #about.[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] I suggested she ask the vending #machines outside, and they told her the #suspect climbed on them.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] She got her info and she left. #Pretty professional, if a bit intimidating.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] She seemed personally invested in #the case, though. The way she lost her #cool was... suspicious.[STOPLIP:]"
l_19 = "[XS:seitalk,1][C:17]Sei:[C:C] You seem to be pretty good at reading #people, Jill.[STOPLIP:]"
