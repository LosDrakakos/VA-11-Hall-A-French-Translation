l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] G'evening.[STOPLIP:]"
l_2 = "[SHOW:185,sprite_dana][XS:dantalk,1][C:15]Dana:[C:C] Hey Jill! Let's have a New Year's #party this Saturday![STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] Isn't that a bit soon?[STOPLIP:]"
l_4 = "[XS:dantalk,1][C:15]Dana:[C:C] Why? Did someone famous get killed #at a New Year's party?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] No, I mean...[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] Nevermind. [STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Sure, I'm in for it.[STOPLIP:]"
l_8 = "[XS:dantalk,1][C:15]Dana:[C:C] Great![STOPLIP:]"
l_9 = "[XS:jilltalk,1][C:13]Jill:[C:C] And Gil?[STOPLIP:]"
l_10 = "[XS:dantalk,1][C:15]Dana:[C:C] He's coming too. I mean, it's not #like he has anything else to do.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hey...[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] No, I mean where is he?[STOPLIP:]"
l_13 = "[XS:dantalk,1][C:15]Dana:[C:C] He was escorting a client of his to #the station. He should be back any second #now.[STOPLIP:]"
l_14 = "[XS:giltalk,1][C:19]Gillian:[C:C] Back.[STOPLIP:]"
l_15 = "[XS:dantalk,1][C:15]Dana:[C:C] See?[STOPLIP:]"
l_16 = "[SHOW:120,sprite_gil][SHOW:280,sprite_dana][XS:jilltalk,1][C:13]Jill:[C:C] So, you coming to the New Year's #party too, Gil?[STOPLIP:]"
l_17 = "[XS:gilface,fucked][XS:giltalk,1][C:19]Gillian:[C:C] It's not like I have anything #else to do, so...[STOPLIP:]"
l_18 = "[XS:dantalk,1][C:15]Dana:[C:C] I told you.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...we're depressing people.[STOPLIP:]"
l_20 = "[XS:gilface,][XS:giltalk,1][C:19]Gillian:[C:C] Oh yeah, the kid from the other #day - Gaby, I think you called her - asked #me to give you this.[STOPLIP:]"
l_21 = "[XS:giltalk,1][C:19]Gillian:[C:C] I believe it's a note.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] A note? Gaby? Let's see...[STOPLIP:]"
l_23 = "[SOUND:pageturn][XS:jilltalk,1][C:43]First of all, I want to apologize for my #behaviour before.[C:C][STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:43]I was still hurt by my sister's death and #it wasn't fair to take out all the stress #on you, let alone put the blame on you.[C:C][STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:43]And so, it feels weird to ask this of you #after how I treated you, but I really want #to talk to you.[C:C][STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:43]I want to catch up, to chat for a while, #to do what you were doing with me before I #lashed out.[C:C][STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:43]I want to understand this freedom you #talked about, the fear that drove you to a #fight with my sister.[C:C][STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:43]I'll go back to the bar on the 31st. I #won't take much of your time. [C:C][STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:43]If you don't wanna see me after all #that, I'll understand.[C:C][STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:43]But please, I really want to talk to you. ##-Gaby[C:C][STOPLIP:]"
l_31 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] Wow, that girl has a big vocabulary.[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] She was always a smart one.[STOPLIP:]"
l_33 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hm? The INI_QUOTS31stINI_QUOTS is written in #different handwriting.[STOPLIP:]"
l_35 = "[XS:gilface,surprise][XS:giltalk,1][C:19]Gillian:[C:C] Oh yeah, she asked me when would #you be here and relatively free. So I told #her about the party.[STOPLIP:]"
l_36 = "[XS:gilface,fucked][XS:giltalk,1][C:19]Gillian:[C:C] I also assumed you'd say yes to #the party, which might not have been the #best idea, now that I think about it.[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_38 = "[XS:jilltalk,1][C:13]Jill:[C:C] B-Boss... I'm having second thoughts #about coming to the party.[STOPLIP:]"
l_39 = "[XS:gilface,][XS:danaface,worry][XS:dantalk,1][C:15]Dana:[C:C] What? Why?[STOPLIP:]"
l_40 = "[XS:jilltalk,1][C:13]Jill:[C:C] B-Because I really don't want to #face Gaby again...[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* Now it's coming back to me... #what drove me to never go back and #apologize after all these years.[STOPLIP:]"
l_42 = "[XS:jilltalk,1][C:13]Jill:[C:C] Fear and shame.[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] Shame because I know I made a #hideously stupid mistake, and it's painful #to face your mistakes.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] And fear of what they might say. [STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] With Lenore, we never broke up #formally, so I was always afraid that if #we were to meet again... [STOPLIP:]"
l_46 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...she'd break up with me.[STOPLIP:]"
l_47 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_48 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...and I don't want Gaby to tell me #that she hates me to my face.[STOPLIP:]"
l_49 = "[XS:jilltalk,1][C:13]Jill:[C:C] Lenore was in the right to break up #with me and Gaby is in the right to hate #me...[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] But I don't want her to. Maybe if I #never see her again, she'll never tell me #that and...[STOPLIP:]"
l_51 = "[XS:dantalk,1][C:15]Dana:[C:C] Jill, you IDIOOOOOOOOOOOOOT!![STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] E-Eh?![STOPLIP:]"
l_53 = "[XS:dantalk,1][C:15]Dana:[C:C] You're thinking backwards! Didn't #the letter say she wanted to understand #you?[STOPLIP:]"
l_54 = "[XS:dantalk,1][C:15]Dana:[C:C] If you bail out on this, she WILL #hate you.[STOPLIP:]"
l_55 = "[XS:dantalk,1][C:15]Dana:[C:C] Not only that, but you're getting a #new chance here![STOPLIP:]"
l_56 = "[XS:dantalk,1][C:15]Dana:[C:C] Do you wanna live the rest of your #life running from another memory?[STOPLIP:]"
l_57 = "[XS:dantalk,1][C:15]Dana:[C:C] Didn't you just say to Armitage that #you hated feeling like that?[STOPLIP:]"
l_58 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...![STOPLIP:]"
l_59 = "[XS:giltalk,1][C:19]Gillian:[C:C] Armitage?[STOPLIP:]"
l_60 = "[XS:dantalk,1][C:15]Dana:[C:C] Titty Hacker.[STOPLIP:]"
l_61 = "[XS:giltalk,1][C:19]Gillian:[C:C] Alma, right.[STOPLIP:]"
l_62 = "[XS:dantalk,1][C:15]Dana:[C:C] I don't know what happened when you #fought with that girl's sister.[STOPLIP:]"
l_63 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] But now you have a chance to make #amends![STOPLIP:]"
l_64 = "[XS:dantalk,1][C:15]Dana:[C:C] And not only that, you have us #watching your back![STOPLIP:]"
l_65 = "[XS:dantalk,1][C:15]Dana:[C:C] So I want you to think about this:[STOPLIP:]"
l_66 = "[XS:dantalk,1][C:15]Dana:[C:C] One day of fear or a lifetime filled #with regret. Which one do you pick?[STOPLIP:]"
l_67 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah.[STOPLIP:]"
l_68 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah! You're right. I hated feeling #like that. I won't run away this time![STOPLIP:]"
l_69 = "[XS:dantalk,1][C:15]Dana:[C:C] Good, because I would've gone to #your apartment and dragged you outta there #if need be.[STOPLIP:]"
l_70 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hey, Boss? Thanks.[STOPLIP:]"
l_71 = "[XS:dantalk,1][C:15]Dana:[C:C] That's what friends are for.[STOPLIP:]"
l_72 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah.[STOPLIP:]"
