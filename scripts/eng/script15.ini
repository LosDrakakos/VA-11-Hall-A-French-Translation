l_1 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] ...[STOPLIP:]"
l_2 = "[XS:seitalk,1][C:17]Sei:[C:C] Hey Jill, wanna know how Stella got #her eye?[STOPLIP:]"
