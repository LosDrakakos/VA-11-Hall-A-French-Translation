l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...how do I put this?[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] They don't care about risk and #danger as much as we do. They treat risks #with a lot more leniency. [STOPLIP:]"
