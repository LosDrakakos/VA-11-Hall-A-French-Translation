l_23 = "[XS:seitalk,1][C:17]Sei:[C:C] Apparently the kick ruptured a couple #of organs and I was put on emergency care.[STOPLIP:]"
l_24 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] I woke up because Stella was punching #my leg telling me to wake up.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Damn...[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Just... damn.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] What made you bring this up?[STOPLIP:]"
