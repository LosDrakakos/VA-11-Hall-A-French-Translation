l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Welcome.[STOPLIP:]"
l_14 = "[SHOW:280,sprite_seiwound][SHOW:120,sprite_stella][XS:seitalk,1][C:17]Sei:[C:C] If you try to talk to someone in the #upper part of the city, they either shrug #you off or flat-out ignore you.[STOPLIP:]"
