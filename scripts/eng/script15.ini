l_13 = "[XS:seitalk,1][C:17]Sei:[C:C] She thought she was the old Santa #spirit in a new body.[STOPLIP:]"
l_14 = "[XS:seitalk,1][C:17]Sei:[C:C] Heh... that girl was delusional as a #kid.[STOPLIP:]"
