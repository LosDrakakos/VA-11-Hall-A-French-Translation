l_3 = "[XS:seitalk,1][C:17]Sei:[C:C] Oh yeah![STOPLIP:]"
l_4 = "[XS:seitalk,1][C:17]Sei:[C:C] Well, you know... her birthday is #actually the 25th.[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Really?[STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] There's a weird story from when she #was a kid.[STOPLIP:]"
l_7 = "[XS:seitalk,1][C:17]Sei:[C:C] She heard Mega Santa's story and #somehow she got it into her head that #by being born on the 25th...[STOPLIP:]"
