l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Something about a rough period where #you were angry or something.[STOPLIP:]"
l_19 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] Oh, that...[STOPLIP:]"
