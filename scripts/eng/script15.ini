l_16 = "[XS:seitalk,1][C:17]Sei:[C:C] Not that things aren't nice there, #though.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Can I get you something?[STOPLIP:]"
