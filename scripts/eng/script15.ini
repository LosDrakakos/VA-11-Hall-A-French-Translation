l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Are you meeting with Sei today?[STOPLIP:]"
l_2 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] She should be here in a bit.[STOPLIP:]"
l_3 = "[XS:steltalk,1][C:16]Stella:[C:C] She told me she wanted a drink #here and since I was coming here too...[STOPLIP:]"
l_4 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] Sadly, I can't stay for long. I #have some errands to run.[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] How has she been lately? [STOPLIP:]"
l_6 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] She's better. Her wounds have been #healing really nicely.[STOPLIP:]"
l_7 = "[XS:steltalk,1][C:16]Stella:[C:C] If only she stopped scratching at #her bandages so often.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] What about her eye?[STOPLIP:]"
l_9 = "[XS:stelface,surprise][XS:steltalk,1][C:16]Stella:[C:C] EYE?![STOPLIP:]"
l_10 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] Oh, hers. Sorry...[STOPLIP:]"
l_11 = "[XS:steltalk,1][C:16]Stella:[C:C] *ahem* It'll take longer to heal, #but as long as it's kept clean, there #should be no problem.[STOPLIP:]"
l_12 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] But to be honest, I'm more worried #about her emotional wounds.[STOPLIP:]"
l_13 = "[XS:steltalk,1][C:16]Stella:[C:C] She doesn't show it, but she's had #depressive bouts from time to time.[STOPLIP:]"
l_14 = "[XS:steltalk,1][C:16]Stella:[C:C] And who can blame her? Her life #changed completely.[STOPLIP:]"
l_15 = "[XS:steltalk,1][C:16]Stella:[C:C] The job she loved no longer #exists, she was used as a disposable pawn #in the whole bank affair...[STOPLIP:]"
l_16 = "[XS:steltalk,1][C:16]Stella:[C:C] I'm afraid it will all make her go #back to her old ways.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Old ways?[STOPLIP:]"
l_18 = "[XS:steltalk,1][C:16]Stella:[C:C] There was a... rough spot when Sei #was a teen.[STOPLIP:]"
l_19 = "[XS:steltalk,1][C:16]Stella:[C:C] Her mom's clinic was about to #close. Then, her biological father, who #was an asshole, showed up.[STOPLIP:]"
l_20 = "[XS:steltalk,1][C:16]Stella:[C:C] And the teachers at her school #didn't help.[STOPLIP:]"
l_21 = "[XS:steltalk,1][C:16]Stella:[C:C] Sei is not a slow learner by any #means, but her way of learning stuff is... #different.[STOPLIP:]"
l_22 = "[XS:steltalk,1][C:16]Stella:[C:C] She needs equivalences to things #she knows. You need to get a bit in her #mindset.[STOPLIP:]"
l_23 = "[XS:steltalk,1][C:16]Stella:[C:C] Once you get this, she's a fast #learner... but schools don't have that #kind of patience.[STOPLIP:]"
l_24 = "[XS:steltalk,1][C:16]Stella:[C:C] They basically branded her a #failure. She even dropped out.[STOPLIP:]"
l_25 = "[XS:steltalk,1][C:16]Stella:[C:C] I would've suggested a special #course somewhere else, but that would've #offended her.[STOPLIP:]"
l_26 = "[XS:steltalk,1][C:16]Stella:[C:C] She's always been against being #labeled as INI_QUOTSspecialINI_QUOTS or INI_QUOTSdifferentINI_QUOTS.[STOPLIP:]"
l_27 = "[XS:steltalk,1][C:16]Stella:[C:C] Anyway, Sei was totally different #during that period.[STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] *pffft*[STOPLIP:]"
l_30 = "[XS:steltalk,1][C:16]Stella:[C:C] Foul-mouthed, short-fused...[STOPLIP:]"
l_31 = "[XS:steltalk,1][C:16]Stella:[C:C] Always frowning; the total #opposite of how she is nowadays.[STOPLIP:]"
l_32 = "[XS:stelface,sad][XS:steltalk,1][C:16]Stella:[C:C] From time to time, I see that old #look cross her face and it scares me.[STOPLIP:]"
l_33 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...you're comparing her to her teen #self, though. People mature.[STOPLIP:]"
