l_9 = "[XS:jilltalk,1][C:13]Jill:[C:C] What about it?[STOPLIP:]"
l_10 = "[XS:mariotalk,1][C:34]Mario:[C:C] On my way here, I almost ran over #my neighbor. He just showed up in the #middle of the street.[STOPLIP:]"
l_11 = "[XS:marioface,surprise][XS:mariotalk,1][C:34]Mario:[C:C] And I say almost because he moved #really quickly out of the way.[STOPLIP:]"
