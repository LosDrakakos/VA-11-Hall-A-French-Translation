l_4 = "[XS:steltalk,1][C:16]Stella:[C:C] Sadly, like many women in that #situation, she just tried to justify his #actions.[STOPLIP:]"
l_5 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] But, apparently, things got nasty #when Sei's mom, Miss Emi, got pregnant.[STOPLIP:]"
l_6 = "[XS:steltalk,1][C:16]Stella:[C:C] At that point she had... an #epiphany, one could say.[STOPLIP:]"
l_7 = "[XS:steltalk,1][C:16]Stella:[C:C] She didn't want that guy to raise #her child. So she finally sought help.[STOPLIP:]"
l_8 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] Things weren't so easy though.[STOPLIP:]"
l_9 = "[XS:steltalk,1][C:16]Stella:[C:C] Before the authorities could take #him away, Miss Emi got a serious beating #from him.[STOPLIP:]"
l_10 = "[XS:steltalk,1][C:16]Stella:[C:C] She still uses a cane to walk, #thanks to that.[STOPLIP:]"
l_11 = "[XS:steltalk,1][C:16]Stella:[C:C] She moved here, Sei was born. She #started her veterinary clinic...[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] So did he come back?[STOPLIP:]"
l_13 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] He was drunk and couldn't find any #drugs, so he made it to the city.[STOPLIP:]"
l_14 = "[XS:steltalk,1][C:16]Stella:[C:C] He caused a ruckus for a couple of #days until Sei managed to scare him off.[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] How?[STOPLIP:]"
l_16 = "[XS:steltalk,1][C:16]Stella:[C:C] She beat him to near death... #three times.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] *pfft*[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Sorry, I shouldn't laugh but...[STOPLIP:]"
l_19 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] Oh, don't worry. I laughed too.[STOPLIP:]"
l_20 = "[XS:stelface,happy][XS:steltalk,1][C:16]Stella:[C:C] The dramatic irony there is #delicious.[XS:ph,7][E:11][STOPLIP:]"
count = 20
[11]
l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] I've been wondering, can you really #be so calm in the lower parts of the #city?[STOPLIP:]"
l_2 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] Hm?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, the streets are not exactly #safe.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] And a Cat Boomer is sure to become a #target.[STOPLIP:]"
l_5 = "[XS:steltalk,1][C:16]Stella:[C:C] Well, I have my security staff #with me at all times, so there's no #problem.[STOPLIP:]"
l_6 = "[XS:steltalk,1][C:16]Stella:[C:C] Besides, this part of the city #is... comfier.[STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Come again?[STOPLIP:]"
l_8 = "[XS:steltalk,1][C:16]Stella:[C:C] Sure, uptown is cleaner and maybe #more secure, but it's also too... sterile.[STOPLIP:]"
l_9 = "[XS:steltalk,1][C:16]Stella:[C:C] Around here you can actually feel #the warmth of the people. You feel #there're people living.[STOPLIP:]"
l_10 = "[XS:steltalk,1][C:16]Stella:[C:C] I especially like going to a busy #food stand - I feel a warmth there that #uptown doesn't have.[STOPLIP:]"
l_11 = "[C:17]???:[C:C][XS:seitalk,1] It's also easier to talk to people.[STOPLIP:]"
