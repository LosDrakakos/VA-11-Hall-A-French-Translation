l_23 = "[XS:seitalk,1][C:17]Sei:[C:C] Making a joke would be tasteless, and #I can't say everything will be alright #without it sounding... cheap.[STOPLIP:]"
l_24 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] I'm... at a loss as to what to do #here. Sorry.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Heh...[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Wanna hear something weird?[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] I was exactly like that when Stella #came here on Monday talking about you.[STOPLIP:]"
l_28 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Oh.[STOPLIP:]"
l_29 = "[XS:virgilioface,][XS:virgiliotalk,1][C:29]Virgilio:[C:C] Well, ladies. I'm leaving.[STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...Virgilio.[STOPLIP:]"
l_31 = "[XS:virgiliotalk,1][C:29]Virgilio:[C:C] Yeah?[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] You were just sitting with a #Valkyrie.[STOPLIP:]"
l_33 = "[XS:virgiliotalk,1][C:29]Virgilio:[C:C] Really?! Splendid! This'll make #a good entry in my poems blog.[XS:virgiliohide,1][STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* I'd feel bad about the way I #treated him today. [STOPLIP:]"
l_35 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...if not for the fact that he was #being cryptic with his orders for no good #reason.[STOPLIP:]"
l_36 = "[SHOW:185,sprite_seiwound][XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] Like Stella when she first came?[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yes... NO!! I mean...[STOPLIP:]"
l_38 = "[XS:seitalk,1][C:17]Sei:[C:C] Heheh...[STOPLIP:]"
l_39 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] You could've given him a free Beer or #something and apologized.[STOPLIP:]"
l_40 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah. I just keep messing things up #with people.[STOPLIP:]"
l_41 = "[XS:seitalk,1][C:17]Sei:[C:C] But you know? He seemed familiar.[STOPLIP:]"
l_42 = "[XS:jilltalk,1][C:13]Jill:[C:C] Familiar?[STOPLIP:]"
l_43 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah, I can't put my finger on it #though. I just feel like I've seen him #somewhere.[STOPLIP:]"
l_44 = "[XS:seitalk,1][C:17]Sei:[C:C] Ah well, it might just be that he #looks like someone from an ad or something.[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, what brings you here?[STOPLIP:]"
l_46 = "[XS:seitalk,1][C:17]Sei:[C:C] I wanted to come with Stella. So I'm #waiting for her.[STOPLIP:]"
l_47 = "[XS:jilltalk,1][C:13]Jill:[C:C] Why here?[STOPLIP:]"
l_48 = "[XS:seitalk,1][C:17]Sei:[C:C] To be with you, of course![STOPLIP:]"
l_49 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] That reminds me. How did Stella #react when you arrived?[STOPLIP:]"
l_51 = "[XS:seiface,pain][XS:seitalk,1][C:17]Sei:[C:C] She slapped me... real hard. It hurt.[STOPLIP:]"
l_52 = "[XS:seitalk,1][C:17]Sei:[C:C] She said INI_QUOTSThat's for making me #worried and not listening to me!INI_QUOTS and then #she became happy.[STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C] Huh...[STOPLIP:]"
l_54 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Can I ask whose loss you are dealing #with?[STOPLIP:]"
l_55 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...you shouldn't be bothered with it.[STOPLIP:]"
l_56 = "[XS:jilltalk,1][C:13]Jill:[C:C] Just pretend I'm in a bad mood and #call it a day.[STOPLIP:]"
l_57 = "[XS:seitalk,1][C:17]Sei:[C:C] Oh, okay.[STOPLIP:]"
l_58 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_59 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] ...[STOPLIP:]"
l_60 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...you really want to know, huh?[STOPLIP:]"
l_61 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] I can't help it! I don't like seeing #people sad. I just need to know context, #not details.[STOPLIP:]"
l_62 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* Someone to whom I said some #mean thing to passed away before I could #ever see her again.[STOPLIP:]"
l_63 = "[XS:jilltalk,1][C:13]Jill:[C:C] Does that work?[STOPLIP:]"
l_64 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Yeah. Sorry.[STOPLIP:]"
l_65 = "[XS:seitalk,1][C:17]Sei:[C:C] Knowing I can't do anything helps me #calm down but...[STOPLIP:]"
l_66 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] E-E-EH!! I mean... it's not that I #wouldn't help! I just...[STOPLIP:]"
l_67 = "[XS:jilltalk,1][C:13]Jill:[C:C] Calm down. I get it.[STOPLIP:]"
l_68 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] I can't contain myself when I see #people in need.[STOPLIP:]"
l_69 = "[XS:seitalk,1][C:17]Sei:[C:C] But I've learned that there are times #when you just can't do anything... and #that's kinda fine.[STOPLIP:]"
l_70 = "[XS:seitalk,1][C:17]Sei:[C:C] Thank god I learned that, otherwise I #would've gone insane ages ago.[STOPLIP:]"
l_71 = "[XS:jilltalk,1][C:13]Jill:[C:C] You're a good person, Sei.[STOPLIP:]"
l_72 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] Nah, I'm just an annoying girl.[STOPLIP:]"
l_73 = "[XS:seitalk,1][C:17]Sei:[C:C] Still, if there's anything I can do #to help, let me know. [STOPLIP:]"
