l_20 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] Agh![STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Are you alright?[STOPLIP:]"
