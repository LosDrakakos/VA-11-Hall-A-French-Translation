l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Can I ask you two something?[STOPLIP:]"
l_2 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Sure![STOPLIP:]"
l_3 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] I guess.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] How did you two meet?[STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] Stella showed up in the park I used #to play at when I was a kid. [STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] We played a couple of times. She #started showing up more and more and that #was it.[STOPLIP:]"
l_7 = "[XS:steltalk,1][C:16]Stella:[C:C] *ahem* My father told me that, #when I was 5, I kept insisting on going to #a INI_QUOTSreal kid's park.INI_QUOTS[STOPLIP:]"
l_8 = "[XS:steltalk,1][C:16]Stella:[C:C] We drove for some time, and the #park I liked was the one Sei happened to #be at.[STOPLIP:]"
l_9 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] Have you ever seen a girl in a dress #go to a muddy park? [STOPLIP:]"
l_10 = "[XS:seitalk,1][C:17]Sei:[C:C] She learned her lesson and started #showing up with more fitting clothes.[STOPLIP:]"
l_11 = "[XS:seitalk,1][C:17]Sei:[C:C] But man, that's a scene I can't #forget.[STOPLIP:]"
l_12 = "[XS:stelface,baka][XS:steltalk,1][C:16]Stella:[C:C] ...[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] So you two have known each other for #most of your lives?[STOPLIP:]"
l_14 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] I've known her longer than I've known #my own father.[STOPLIP:]"
l_15 = "[XS:seitalk,1][C:17]Sei:[C:C] Why the question?[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] No reason. You two just look so #comfortable with each other. Any other #person could've sworn you were an item.[STOPLIP:]"
l_17 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] A-An item? What kind of item?[STOPLIP:]"
l_18 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] ...a couple, Sei.[STOPLIP:]"
l_19 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Oh! Ite-... yeah, I get it now.[STOPLIP:]"
l_20 = "[XS:seitalk,1][C:17]Sei:[C:C] It's funny because we actually earned #a mock prize of sorts for INI_QUOTSbest coupleINI_QUOTS at #Stella's high school. [STOPLIP:]"
l_21 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] ...Three years in a row.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] So you two didn't go to the same #high school?[STOPLIP:]"
l_23 = "[XS:seitalk,1][C:17]Sei:[C:C] Nope.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Oh.[STOPLIP:]"
l_25 = "[XS:seitalk,1][C:17]Sei:[C:C] Don't you have any childhood friends, #Jill?[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Childhood friends... can't think of #any. My grandpa, I guess.[STOPLIP:]"
l_27 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] What kind of man was he?[STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] Gruff. The kind to eat raw Bronson #roots every morning.[STOPLIP:]"
l_29 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] *brrrrrr*[STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] But around me he, was... different. [STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] I have memories of him barking #orders to my dad, only to turn around and #play with me gently.[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's interesting though. He was my #mom's dad. But after my mom and dad #separated, he stayed with my dad.[STOPLIP:]"
l_33 = "[XS:jilltalk,1][C:13]Jill:[C:C] But yeah, he's the one that comes to #mind when I think about childhood friends.[STOPLIP:]"
l_34 = "[XS:seitalk,1][C:17]Sei:[C:C] Ooooooh.[STOPLIP:]"
l_35 = "[XS:seitalk,1][C:17]Sei:[C:C] Hey Jill, what's this... Bloom Light?[STOPLIP:]"
