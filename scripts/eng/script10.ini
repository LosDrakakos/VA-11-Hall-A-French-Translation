l_7 = "[XS:giltalk,1][C:19]Gillian:[C:C] I believe she went outside to #look for that Stella girl or something.[XS:gilhide,1][STOPLIP:]"
l_8 = "[XS:steltalk,1][C:16]Stella:[C:C] The way you are right now, it #feels like I should be protecting you.[STOPLIP:]"
