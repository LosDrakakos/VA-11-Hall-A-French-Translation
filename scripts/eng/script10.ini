l_10 = "[XS:steltalk,1][C:16]Stella:[C:C] Yeah, I remember that one. 1mm #more and you would've lost the motor #function in your arm.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Welcome.[STOPLIP:]"
l_12 = "[SHOW:280,sprite_seiwound][SHOW:120,sprite_stella][XS:steltalk,1][C:16]Stella:[C:C] Ah. Hello, Jill.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] What's this about protecting who?[STOPLIP:]"
l_14 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah, um... I'm sort of like Stella's #unofficial bodyguard. But I'm not really #fit for such duties right now.[STOPLIP:]"
l_15 = "[XS:steltalk,1][C:16]Stella:[C:C] My father insists I go everywhere #with protection. So most of the time I #only ask Sei if she feels like going out.[STOPLIP:]"
l_16 = "[XS:steltalk,1][C:16]Stella:[C:C] She's trained to deal with the #kind of things that bodyguards deal with #anyway.[STOPLIP:]"
l_17 = "[XS:stelface,happy][XS:steltalk,1][C:16]Stella:[C:C] And she's more fun to hang around #with too.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] So I'm assuming that gorilla outside #is a bodyguard?[STOPLIP:]"
l_19 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] That's Buster. Pretty cool guy. He #played football professionally until he #lost his leg in a demolition derby.[STOPLIP:]"
l_20 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] We've offered him an implant #surgery for all his years of service, but #he rejects it every time.[STOPLIP:]"
l_21 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Well, he got used to the replacement #he's using, so maybe it's for the best.[STOPLIP:]"
l_22 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] It's a thick oak branch on a metal #bowl tied to his stump.[STOPLIP:]"
l_23 = "[XS:seitalk,1][C:17]Sei:[C:C] And yet he can still run faster than #me with it.[STOPLIP:]"
l_24 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] True.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Do you want something?[STOPLIP:]"
