l_1 = "[XS:seitalk,1][C:17]Sei:[C:C] You know what cheers me up?[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] What?[STOPLIP:]"
l_3 = "[XS:seitalk,1][C:17]Sei:[C:C] Singing. Hearing people sing helps #too.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] Do you sing? I mean... did you take #singing lessons or something?[STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] Nope. People have told me my voice is #pretty nasty, actually. But they've also #told me I'm good with the harmonica.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] So you play the harmonica?[STOPLIP:]"
l_7 = "[XS:seitalk,1][C:17]Sei:[C:C] I needed something to do some #breathing exercises with, and a harmonica #is a lot smaller than a tuba.[STOPLIP:]"
l_8 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] And I guess if you practice enough, #you become decent.[STOPLIP:]"
l_9 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's something I didn't expect.[STOPLIP:]"
l_10 = "[XS:seitalk,1][C:17]Sei:[C:C] I hear that a lot. I know I don't #look like the musical type.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] I used to play the violin. Right #until I was... 16 or so.[STOPLIP:]"
l_12 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Really? Can you still play?[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] The violin's at my mom's house, so I #don't have it with me.[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] But I guess I could. It's one of #those things you don't forget easily.[STOPLIP:]"
l_15 = "[XS:seitalk,1][C:17]Sei:[C:C] Why did you stop?[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't know. One day, I just felt #like stopping. No deep reason behind it.[STOPLIP:]"
l_17 = "[XS:seitalk,1][C:17]Sei:[C:C] Just like me and cooking![STOPLIP:]"
l_18 = "[XS:seitalk,1][C:17]Sei:[C:C] That... and almost burning my place #up.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
