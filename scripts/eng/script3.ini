l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hey, speaking of routines...[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] As a hacker, what's your opinion on #the whole Alice_Rabbit thing?[STOPLIP:]"
l_9 = "[XS:almaface,serious][XS:almatalk,1][C:14]Alma:[C:C] ...[XS:almatalk,0][STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's the silence of somebody who #just heard something stupid.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Stupid enough to warrant the speech #they've prepared just for occasions like #this.[STOPLIP:]"
l_12 = "[XS:almatalk,1][C:14]Alma:[C:C] As always, very perceptive of you.[XS:almatalk,0][STOPLIP:]"
l_13 = "[XS:almatalk,1][C:14]Alma:[C:C] You know, decades ago, there was this #group of people that hacked simple sites #with an INI_QUOTSagendaINI_QUOTS.[XS:almatalk,0][STOPLIP:]"
l_14 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C] Can't remember what they used to call #themselves. I just remember that it was #just petty vandalism.[XS:almatalk,0][STOPLIP:]"
l_15 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C] Anyway, everyone that participated #started using the same name.[XS:almatalk,0][STOPLIP:]"
l_16 = "[XS:almatalk,1][C:14]Alma:[C:C] They wanted to create this... anonymous #anarchists identity.[XS:almatalk,0][STOPLIP:]"
l_17 = "[XS:almatalk,1][C:14]Alma:[C:C] The whole Alice_Rabbit thing is the #logical conclusion of that. [XS:almatalk,0][STOPLIP:]"
l_18 = "[XS:almatalk,1][C:14]Alma:[C:C] It's what happens when that idea #reaches its breaking point and goes #mainstream.[XS:almatalk,0][STOPLIP:]"
l_19 = "[XS:almatalk,1][C:14]Alma:[C:C] It is no longer a group, but an #individual.[XS:almatalk,0][STOPLIP:]"
l_20 = "[XS:almatalk,1][C:14]Alma:[C:C] An untouchable entity watching from the #shadows, monitoring and judging everything #anyone does...[XS:almatalk,0][STOPLIP:]"
l_21 = "[XS:almatalk,1][C:14]Alma:[C:C] Observing, tolerating no one but #itself...[XS:almatalk,0][STOPLIP:]"
l_22 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C] A lot of bullshit for what's #essentially a pet the press made up.[XS:almatalk,0][STOPLIP:]"
l_23 = "[XS:almatalk,1][C:14]Alma:[C:C] The antithesis of your usual bogeyman, #if you must.[XS:almatalk,0][STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, you don't think such a person #exists?[STOPLIP:]"
l_25 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C] Don't know, don't care.[XS:almatalk,0][STOPLIP:]"
l_26 = "[XS:almatalk,1][C:14]Alma:[C:C] I mean, we HAVE seen the actions of #such an entity.[XS:almatalk,0][STOPLIP:]"
l_27 = "[XS:almatalk,1][C:14]Alma:[C:C] But it might be anything. An #individual, a group, an AI...[XS:almatalk,0][STOPLIP:]"
l_28 = "[XS:almatalk,1][C:14]Alma:[C:C] That's not taking into account all the #copycats and pranksters using the name.[XS:almatalk,0][STOPLIP:]"
l_29 = "[XS:almatalk,1][C:14]Alma:[C:C] So, Alice_Rabbit is a thing that #exists, but it's also really muddied #overall.[XS:almatalk,0][STOPLIP:]"
l_30 = "[XS:almaface,concern][XS:almatalk,1][C:14]Alma:[C:C] There's something else that worries me, #though.[XS:almatalk,0][STOPLIP:]"
l_31 = "[XS:almatalk,1][C:14]Alma:[C:C] That kind of story always catches the #attention of kids and such.[XS:almatalk,0][STOPLIP:]"
l_32 = "[XS:almatalk,1][C:14]Alma:[C:C] They start trying to hack stuff without #knowing the risks or consequences.[XS:almatalk,0][STOPLIP:]"
