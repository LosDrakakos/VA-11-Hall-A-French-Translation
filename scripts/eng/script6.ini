l_52 = "[XS:dantalk,1][C:15]Dana:[C:C] Whoa, you got excited there.[STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C] And that is the problem. Back #then I was obsessed with Jules. [STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] I sang the songs, dressed like #her. I could even recite full #chapters.[STOPLIP:]"
