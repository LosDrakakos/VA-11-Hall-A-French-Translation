[1]
l_1 = "[SHOW:185,sprite_dana][XS:dantalk,1][C:15]Dana:[C:C] Rise and shine.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] *yawn* G'mornin'.[STOPLIP:]"
l_3 = "[XS:dantalk,1][C:15]Dana:[C:C] It's 11 a.m., though.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's morning for me on the #weekends... and any other day. How's #everything outside?[STOPLIP:]"
l_5 = "[XS:dantalk,1][C:15]Dana:[C:C] Still noisy, but forces have been #deployed to take care of most of 'em at #least.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] How so?[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] Zaibatsu Corp's President is pleading #with INI_QUOTSanyoneINI_QUOTS to stop the rogue White #Knights.[STOPLIP:]"
l_8 = "[XS:dantalk,1][C:15]Dana:[C:C] Neighboring city forces were deployed #quickly and have subdued most of the #opposition.[STOPLIP:]"
l_9 = "[XS:dantalk,1][C:15]Dana:[C:C] There have also been reports of White #Knights just... freezing. Like they were #petrified somehow.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] You make it sound like some god #suddenly decided to put everything in #place.[STOPLIP:]"
l_11 = "[XS:danaface,closedsmile][XS:dantalk,1][C:15]Dana:[C:C] Well, I'm just glad no bullets are #flying in and out of the whole building.[STOPLIP:]"
l_12 = "[XS:dantalk,1][C:15]Dana:[C:C] Sure, there're still some bad apples #out and it's not really safe yet, but it #was worse last night.[STOPLIP:]"
l_13 = "[XS:danaface,worry][XS:dantalk,1][C:15]Dana:[C:C] There also seems to be a civilian #force lynching any White Knight they spot.[STOPLIP:]"
l_14 = "[XS:dantalk,1][C:15]Dana:[C:C] So not only are the White Knights a #problem, regular folks are on edge too.[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] (I wonder if Sei is okay...)[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] Should we be worried about Gil?[STOPLIP:]"
l_17 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] That kid knows how to take care of #himself.[STOPLIP:]"
l_18 = "[XS:dantalk,1][C:15]Dana:[C:C] I'm sure that... whatever it is that #he's doing, he's safe.[STOPLIP:]"
l_19 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] Dare I say even safer wherever he is #than here.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] I sure hope so.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Are we gonna work today?[STOPLIP:]"
l_22 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] Nah, things are too nasty right now. #Let's take the Sunday off.[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] Oh, alright.[STOPLIP:]"
l_24 = "[XS:dantalk,1][C:15]Dana:[C:C] Say, do you want me to help you get #to your apartment?[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Actually yeah, I'd appreciate that.[STOPLIP:]"
l_26 = "[XS:dantalk,1][C:15]Dana:[C:C] Okay then. Let me lock things up and #we'll go.[STOPLIP:]"
l_27 = "[XS:dantalk,1][C:15]Dana:[C:C] We'll grab something for lunch on the #way.[STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] Sounds good.[XS:ph,2][E:2][STOPLIP:]"
count = 28
[2]
l_1 = "[XS:dantalk,1][C:15]Dana:[C:C] Aaaaaaaaand here we are.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] Home sweet home. Thanks a lot.[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hey Boss, wanna hang out for a bit?[STOPLIP:]"
l_4 = "[XS:dantalk,1][C:15]Dana:[C:C] Hm?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, grab a Beer, chill out for a #bit... Mostly to thank you for helping me.[STOPLIP:]"
l_6 = "[XS:dantalk,1][C:15]Dana:[C:C] Well, I don't have much to do anyway. #So yeah, sure.[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] I did tell you you should invite me #to your apartment sometime, didn't I?[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] Oh, yeah. You did.[STOPLIP:]"
l_9 = "[XS:dantalk,1][C:15]Dana:[C:C] What worries me a bit is that Beer #always leads to something else.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] To more Beer?[STOPLIP:]"
l_11 = "[XS:dantalk,1][C:15]Dana:[C:C] I was gonna say, INI_QUOTSTo one of us going #through the Spanish announcers' table.INI_QUOTS[STOPLIP:]"
l_12 = "[XS:dantalk,1][C:15]Dana:[C:C] But I think we're safe here.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Come on in, then.[STOPLIP:]"
l_14 = "[XS:dantalk,1][C:15]Dana:[C:C] Excuse me...[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] Want one?[STOPLIP:][SHOW:0,codec_cigar]"
l_16 = "[XS:dantalk,1][C:15]Dana:[C:C] Sorry, I don't smoke. Don't mind me #though, smoke if you wanna.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] Thanks.[STOPLIP:][XS:codechide,1]"
l_18 = "[XS:dantalk,1][C:15]Dana:[C:C] Say, how is the chilly weather #treating you?[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] It gets cold from time to time but #nothing the kotatsu and the heater can't #fix.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] Oh right, Boss. You're not very good #with the cold, are you?[STOPLIP:]"
l_21 = "[XS:dantalk,1][C:15]Dana:[C:C] You know it...[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] You didn't bring your jacket here #either.[STOPLIP:]"
l_23 = "[XS:dantalk,1][C:15]Dana:[C:C] Yeah, I left it at home when going to #the bar yesterday. [STOPLIP:]"
l_24 = "[XS:dantalk,1][C:15]Dana:[C:C] It wasn't that cold and I didn't #expect to spend the night at the bar.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Would you like a sweater or something?[STOPLIP:]"
l_26 = "[XS:dantalk,1][C:15]Dana:[C:C] Oh, don't mind me.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] I insist. I have this hoodie from some #time ago and it was too big for me.[STOPLIP:]"
l_28 = "[XS:dantalk,1][C:15]Dana:[C:C] Why buy it then?[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] It was dirt-cheap![STOPLIP:]"
l_30 = "[XS:dantalk,1][C:15]Dana:[C:C] Right...[STOPLIP:]"
l_31 = "[XS:dantalk,1][C:15]Dana:[C:C] Wait... w-where did you get this one?[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] Dunno. Some flea market ages ago. Why?[STOPLIP:]"
l_33 = "[XS:dantalk,1][C:15]Dana:[C:C] Nothing. It's just like one I had many #years ago.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] What happened to it?[STOPLIP:]"
l_35 = "[XS:dantalk,1][C:15]Dana:[C:C] Too much use, it just... ripped.[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C] I see...[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] You can keep it if you want, I never #use it anyway.[STOPLIP:]"
l_38 = "[XS:dantalk,1][C:15]Dana:[C:C] Um... we'll see.[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] Come to think of it, how old are you, #Boss?[STOPLIP:]"
l_40 = "[XS:dantalk,1][C:15]Dana:[C:C] I'm eternally seventeen![STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] Fair enough. Seventeen plus how much?[STOPLIP:]"
l_42 = "[XS:dantalk,1][C:15]Dana:[C:C] Seventeen plus I'd have to cut your #tongue if you knew.[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...alright.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] Let me go change into something more #comfortable.[STOPLIP:]"
l_45 = "[XS:dantalk,1][C:15]Dana:[C:C] Take your time.[STOPLIP:]"
l_46 = "[XS:dantalk,1][C:15]Dana:[C:C] ...[STOPLIP:]"
l_47 = "[SHOW:0,codec_fore]Fore: ...[STOPLIP:]"
l_48 = "[XS:dantalk,1][C:15]Dana:[C:C] ...[STOPLIP:]"
l_49 = "[XS:dantalk,1][C:15]Dana:[C:C] Say Jill, there's a blue-eyed mass of #black fur glaring in my general direction.[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hm? Oh, that's just Fore. He's just #wary of any new visitors. Cats will be cats, #I guess.[STOPLIP:]"
l_51 = "[XS:jilltalk,1][C:13]Jill:[C:C] He'll warm up quickly though. Just #give him time.[STOPLIP:]"
l_52 = "[XS:dantalk,1][C:15]Dana:[C:C] He's unusual-looking. Blue eyes on a #black cat. They usually have green.[STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, weird, huh?[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] At first I thought they were like that #because he was small but they never changed.[STOPLIP:]"
l_55 = "[XS:codechide,1][XS:jilltalk,1][C:13]Jill:[C:C] Do you have any pets, Boss?[STOPLIP:]"
l_56 = "[XS:dantalk,1][C:15]Dana:[C:C] Back at home we had a bear.[STOPLIP:]"
l_57 = "[XS:jilltalk,1][C:13]Jill:[C:C] Ah, I se-... what?[STOPLIP:]"
l_58 = "[XS:dantalk,1][C:15]Dana:[C:C] Good ol' Bosco. He kept intruders away #better than any dog.[STOPLIP:]"
l_59 = "[XS:jilltalk,1][C:13]Jill:[C:C] R-Right...[STOPLIP:]"
l_60 = "[SHOW:0,codec_pic][XS:dantalk,1][C:15]Dana:[C:C] Hm? This picture here isn't something #you see everyday.[STOPLIP:]"
l_61 = "[XS:jilltalk,1][C:13]Jill:[C:C] What? Me taking such a sappy pic?[STOPLIP:]"
l_62 = "[XS:dantalk,1][C:15]Dana:[C:C] No, a framed picture on printed paper. #It's so... vintage.[STOPLIP:]"
l_63 = "[XS:dantalk,1][C:15]Dana:[C:C] Who are these?[STOPLIP:]"
l_64 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's... um... [STOPLIP:]"
l_65 = "[XS:jilltalk,1][C:13]Jill:[C:C] The one on the right is Lenore, my... #ex-girlfriend. The one on the left is #Gabrielle, her sister.[STOPLIP:]"
l_66 = "[XS:dantalk,1][C:15]Dana:[C:C] Huh. Is this pic recent or...?[STOPLIP:]"
l_67 = "[XS:jilltalk,1][C:13]Jill:[C:C] Actually, that one's from 3-4 years #ago.[STOPLIP:]"
l_68 = "[XS:dantalk,1][C:15]Dana:[C:C] ...[STOPLIP:]"
l_69 = "[XS:dantalk,1][C:15]Dana:[C:C] You look exactly the same.[STOPLIP:]"
l_70 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'm only 27. What did you expect? #That's why they say kids are the ones #that get old.[STOPLIP:]"
l_71 = "[XS:dantalk,1][C:15]Dana:[C:C] I thought it was recent because you #don't usually see people displaying #pictures of their exes so openly.[STOPLIP:]"
l_72 = "[XS:dantalk,1][C:15]Dana:[C:C] ...let alone a printed and framed one.[STOPLIP:]"
l_73 = "[XS:dantalk,1][C:15]Dana:[C:C] Did you two break up on good terms, #then? You even hesitated a bit when #calling her your ex.[STOPLIP:]"
l_74 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* Let's just say that everything #ended with both of us saying mean things.[STOPLIP:]"
l_75 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...and me storming out of her house, #breaking a couple of things on the way #out.[STOPLIP:]"
l_76 = "[XS:jilltalk,1][C:13]Jill:[C:C] We never broke up formally... and I #guess I still have feelings for her.[STOPLIP:]"
l_77 = "[XS:jilltalk,1][C:13]Jill:[C:C] I just... went away, haven't said #a word since.[STOPLIP:]"
l_78 = "[XS:dantalk,1][C:15]Dana:[C:C] Really? It's... hard to picture you #doing such a thing. And you look so happy #in the pic.[STOPLIP:]"
l_79 = "[XS:dantalk,1][C:15]Dana:[C:C] Why have her pic out like this then?[STOPLIP:]"
l_80 = "[XS:jilltalk,1][C:13]Jill:[C:C] I just couldn't get my mind off #something that Alma said to me.[STOPLIP:]"
l_81 = "[XS:jilltalk,1][C:13]Jill:[C:C] About missing having the warmth of #someone else pressed against your side...[STOPLIP:]"
l_82 = "[XS:jilltalk,1][C:13]Jill:[C:C] Using them as a pillow, mixing your #perfume with theirs.[STOPLIP:]"
l_83 = "[XS:jilltalk,1][C:13]Jill:[C:C] Putting your head in their chest, #listening to their breathing as they pet #your head.[STOPLIP:]"
l_84 = "[XS:jilltalk,1][C:13]Jill:[C:C] Dozing off knowing they're there, #watching you. Protecting you...[STOPLIP:]"
l_85 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't know. I felt nostalgic... then #miserable.[STOPLIP:]"
l_86 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_87 = "[XS:dantalk,1][C:15]Dana:[C:C] I'll... just put this away.[STOPLIP:][XS:codechide,1]"
l_88 = "[XS:dantalk,1][C:15]Dana:[C:C] ...[STOPLIP:]"
l_89 = "[XS:jilltalk,1][C:13]Jill:[C:C] I've been meaning to apologize, but I #feel like it's too late now.[STOPLIP:]"
l_90 = "[XS:jilltalk,1][C:13]Jill:[C:C] Whenever I go out, there's this fear #in the back of my head that I'll meet her #in the street.[STOPLIP:]"
l_91 = "[XS:jilltalk,1][C:13]Jill:[C:C] I just don't know if I could face #her again. Let alone talk to her.[STOPLIP:]"
l_92 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...I'd be a mess.[STOPLIP:]"
l_93 = "[XS:dantalk,1][C:15]Dana:[C:C] It's never too late to apologize, #Jill.[STOPLIP:]"
l_94 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe.[STOPLIP:]"
l_95 = "[XS:dantalk,1][C:15]Dana:[C:C] Hm? What's that on the table?[STOPLIP:][SHOW:0,codec_letter]"
l_96 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...![STOPLIP:]"
l_97 = "[XS:dantalk,1][C:15]Dana:[C:C] Looks like an enve-...[STOPLIP:]"
l_98 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's nothing! NOTHING! Now, please #give that to me.[STOPLIP:]"
l_99 = "[XS:dantalk,1][C:15]Dana:[C:C] ...lope. Alright.[STOPLIP:][XS:codechide,1]"
l_100 = "[XS:dantalk,1][C:15]Dana:[C:C] I saw nothing, don't worry.[STOPLIP:]"
l_101 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_102 = "[XS:jilltalk,1][C:13]Jill:[C:C] A-Anyway... Let's grab some Beers![STOPLIP:]"
l_103 = "[XS:dantalk,1][C:15]Dana:[C:C] Guide me.[XS:ph,3][XS:keeptext,0][E:3][STOPLIP:]"
