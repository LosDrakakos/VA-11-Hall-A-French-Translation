l_13 = "[XS:dantalk,1][C:15]Dana:[C:C] C'était un complément ou un truc du #genre, n'est-ce pas?[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] Il s'agit d'un fluide expérimental #qu'ils ont créé pour remplacer l'eau quand #le Maiden Kiss a pollué les #approvisionnements en eau.[STOPLIP:]"
