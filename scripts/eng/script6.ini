l_30 = "[XS:dantalk,1][C:15]Dana:[C:C] Ouais...[STOPLIP:]"
l_31 = "[XS:dantalk,1][C:15]Dana:[C:C] Attend... o-où est-ce que tu l'as eu #celui-là?[STOPLIP:]"
