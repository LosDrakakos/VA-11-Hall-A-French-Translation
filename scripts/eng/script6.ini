l_16 = "[XS:dantalk,1][C:15]Dana:[C:C] There's a HDD in the forearm I #use to save assorted data.[STOPLIP:]"
l_17 = "[XS:dantalk,1][C:15]Dana:[C:C] It has a flashlight and a clock, #but many prosthetic arms have those #nowadays. Kinda like watches.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] How did you feel when you lost #it?[STOPLIP:]"
l_19 = "[XS:dantalk,1][C:15]Dana:[C:C] To be honest, I was sad, but I #was also satisfied.[STOPLIP:]"
