l_11 = "[XS:danaface,closedsmile][XS:dantalk,1][C:15]Dana:[C:C] Ben, je suis surtout contente de pas #voir de balles voler dans tout l'immeuble.[STOPLIP:]"
l_12 = "[XS:dantalk,1][C:15]Dana:[C:C] D'accord, y'a toujours quelques #fruits pourris dehors et c'est pas encore #très sûr, mais c'était pire la nuit #dernière.[STOPLIP:]"
l_13 = "[XS:danaface,worry][XS:dantalk,1][C:15]Dana:[C:C] Il semble qu'il y a aussi une force #civile qui lynche tous les Chevaliers #Blancs qu'elle aperçoit.[STOPLIP:]"
