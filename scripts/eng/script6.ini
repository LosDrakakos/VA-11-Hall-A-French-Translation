[4]
l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] There's my alcohol collection if #you feel like getting anything else.[STOPLIP:]"
l_2 = "[XS:dantalk,1][C:15]Dana:[C:C] Those bottles over there?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] I can't afford a fancy fridge or #whatever for them so I have to put #them in plain sight.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'm guessing if some authority on #alcohol came in here, he'd stab me for #crimes against beverages or something.[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Anyway, many of them are still #drinkable. [STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] I could get you some of the #Absinthe I brought to the bar if you #want.[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] I'm not an Oscar Wilde kind of #person, sadly. I'm more of a Theodore #Roosevelt girl.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] I have a teddy bear on my closet. #But I don't think you can drink it.[STOPLIP:]"
l_9 = "[XS:dantalk,1][C:15]Dana:[C:C] Nah, that's what I-... wait, you #do?[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'm not ashamed of Doctor Fluff but it #just so happens that I have a #cat. [STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] And I don't want the bear's #fillings spilled all over the place.[STOPLIP:]"
l_12 = "[XS:dantalk,1][C:15]Dana:[C:C] Oh...[STOPLIP:]"
l_13 = "[XS:dantalk,1][C:15]Dana:[C:C] Anyway, Beer's fine. Don't worry.[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] If you say so.[STOPLIP:]"
l_15 = "[XS:dantalk,1][C:15]Dana:[C:C] Where did that collection come #from anyways?[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] Calling it a INI_QUOTSCollectionINI_QUOTS is too #generous, I think.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] I got it from my grandpa. He made #a will where the only thing stipulated #was that I got them.[STOPLIP:]"
l_18 = "[XS:dantalk,1][C:15]Dana:[C:C] Heh, that's sweet.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] I've already downed some of it #over the years though. Half of them #have colored water instead of alcohol.[STOPLIP:]"
l_20 = "[XS:dantalk,1][C:15]Dana:[C:C] I guess you'd need to be an expert #or something to notice the difference.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, I make sure the water's the #right color though.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] Bottomline, if you wanna taste #anything from it, let me know.[STOPLIP:]"
l_23 = "[XS:dantalk,1][C:15]Dana:[C:C] You're too kind.[XS:ph,5][E:5][STOPLIP:]"
count = 23
