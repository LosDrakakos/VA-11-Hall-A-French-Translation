l_5 = "[XS:dantalk,1][C:15]Dana:[C:C] C'est toujours le boxon, mais au #moins les autorités ont été déployées pour #gérer tout ça.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] Comment ça?[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] Le président de Zaibatsu Corp #President supplie INI_QUOTStout le mondeINI_QUOTS d'arrêter #les Chevaliers Blancs rebelles.[STOPLIP:]"
