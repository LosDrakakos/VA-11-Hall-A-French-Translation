l_17 = "[XS:dantalk,1][C:15]Dana:[C:C] Et cette bière est faite avec?[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Voyons voir... ouaip, regardez, vers #la fin: LDN et farine de blé.[STOPLIP:]"
l_19 = "[XS:dantalk,1][C:15]Dana:[C:C] Farine de blé?[STOPLIP:]"
