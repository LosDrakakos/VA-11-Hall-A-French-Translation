[3]
l_1 = "[XS:dantalk,1][C:15]Dana:[C:C] Bon sang, t'as une tonne de bières.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] Ben, la BTC m'offre des réductions et #une carte à points que je peux utiliser à #chaque fois que j'achète leur alcool.[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] Du coup, la bière est la boisson la #moins chère que je peux avoir.[STOPLIP:]"
l_4 = "[XS:dantalk,1][C:15]Dana:[C:C] Y'a une différence entre les boissons #du bar et celles-là?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Les boissons du bar créent une plus #grande dépendance, ont plus de goût et sont #aussi plus fortes que celles qu'ils vendent #dans les magasins.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] Et aussi, la bière du bar c'est plus #de la Double IPA. Celle-là c'est plus de la #Pilsner.[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] En bon français, s'il te plaît.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] Celle-ci a une couleur plus claire et #un goût plus léger.[STOPLIP:]"
l_9 = "[XS:dantalk,1][C:15]Dana:[C:C] Chais pas, je trouve pas le goût plus #léger justement.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] *Pffffft*[STOPLIP:]"
l_11 = "[XS:dantalk,1][C:15]Dana:[C:C] Est ce que celle-ci est fait avec... #hum... c'est quoi le nom de cette base #liquide dont tu te sers au bar déjà?[STOPLIP:]"
