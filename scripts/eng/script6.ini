[3]
l_1 = "[XS:dantalk,1][C:15]Dana:[C:C] Damn, you have lots of Beer.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, the BTC gives me discounts #and a point card I can use every time #I buy their alcohol.[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] With that, Beer is actually the #cheapest drink I can get.[STOPLIP:]"
l_4 = "[XS:dantalk,1][C:15]Dana:[C:C] Is there any difference between #the drinks at the bar and these?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] The drinks at the bar are more #addictive, flavorful and also stronger #than the ones they sell in stores.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] And besides, the one in the bar #is more of a Double IPA. This #one is more of a Pilsner.[STOPLIP:]"
l_7 = "[XS:dantalk,1][C:15]Dana:[C:C] In English, please.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] This one's lighter in color and #lighter in flavor.[STOPLIP:]"
l_9 = "[XS:dantalk,1][C:15]Dana:[C:C] Dunno, it doesn't taste like a #lighter to me.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] *pffffft*[STOPLIP:]"
l_11 = "[XS:dantalk,1][C:15]Dana:[C:C] Is this one made with that... #um... what was the name of the base #liquid you use at the bar again?[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] Nutriogenic Dichometrical #Lydogenol, or NDL.[STOPLIP:]"
l_13 = "[XS:dantalk,1][C:15]Dana:[C:C] It was a supplement or something, #right?[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] It was an experimental fluid they #created to replace water when the #Maiden Kiss polluted water supplies.[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] The effects of pollution turned #out to be temporary, so NDL never went #into mass production. [STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] But the BTC still commissioned it #for use in bars.[STOPLIP:]"
l_17 = "[XS:dantalk,1][C:15]Dana:[C:C] And is this one made with it?[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Let's see... yup, here it is, #near the end: NDL and corn starch.[STOPLIP:]"
l_19 = "[XS:dantalk,1][C:15]Dana:[C:C] Corn starch?[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] It serves as a stabilizer, if I #remember correctly. They need it for #packaged drinks.[STOPLIP:]"
l_21 = "[XS:dantalk,1][C:15]Dana:[C:C] I see. And I just realized #something.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] What?[STOPLIP:]"
l_23 = "[XS:dantalk,1][C:15]Dana:[C:C] You're a nerd, Jill.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Guilty as charged.[XS:ph,4][E:4][STOPLIP:]"
