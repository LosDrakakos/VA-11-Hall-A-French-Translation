l_33 = "[XS:steltalk,1][C:16]Stella:[C:C] And of course, even single pieces of #the armor fetch a high price these days.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] Could anyone see any profit from that #research to justify those expenses?[STOPLIP:]"
l_35 = "[XS:steltalk,1][C:16]Stella:[C:C] It's new tech, a whole new field ripe #with patents just opened for many. So I'd #say yes.[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C] Huh...[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, the BTC is literally a #conglomerate built upon patents and #trademarks, I can see how.[STOPLIP:]"
l_38 = "[XS:steltalk,1][C:16]Stella:[C:C] There is one weird case though...[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hm?[STOPLIP:]"
l_40 = "[XS:steltalk,1][C:16]Stella:[C:C] There's this guy named Jack. He's the #captain of a very unique Blitzkrieg Corps #unit.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] Unique?[STOPLIP:]"
l_42 = "[XS:steltalk,1][C:16]Stella:[C:C] The guy had a really small unit. Five #people, including himself.[STOPLIP:]"
l_43 = "[XS:steltalk,1][C:16]Stella:[C:C] The aesthetics of his unit's armor #was heavily modded to the point that they #looked like a squad of Henshin Heroes.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hen what?[STOPLIP:]"
l_45 = "[XS:stelface,baka][XS:steltalk,1][C:16]Stella:[C:C] ...[STOPLIP:]"
l_46 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] *ahem* They looked really gaudy.[STOPLIP:]"
l_47 = "[XS:steltalk,1][C:16]Stella:[C:C] But it turned out that the guy #actually broke through the software and #disabled the remote switch.[STOPLIP:]"
l_48 = "[XS:steltalk,1][C:16]Stella:[C:C] He has one of the few - if not the #only - suits of armor with the OS intact.[STOPLIP:]"
l_49 = "[XS:steltalk,1][C:16]Stella:[C:C] To say they're among the most wanted #people would be an understandment.[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] You know a lot about this.[STOPLIP:]"
l_51 = "[XS:steltalk,1][C:16]Stella:[C:C] It's interesting, the amount of things #you hear when dealing with drunk people of #all kinds in the same place.[STOPLIP:]"
l_52 = "[XS:steltalk,1][C:16]Stella:[C:C] It also helps to put on a front #that makes people lower their guard...[STOPLIP:]"
l_53 = "[XS:steltalk,1][C:16]Stella:[C:C] That should sound familiar to you.[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] True.[STOPLIP:]"
l_55 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_56 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...wait.[STOPLIP:]"
l_57 = "[XS:steltalk,1][C:16]Stella:[C:C] Here's a freebie. A fun fact.[STOPLIP:]"
l_58 = "[XS:steltalk,1][C:16]Stella:[C:C] The failsafe was originally going to #involve the armor blowing up and leaving #no traces.[STOPLIP:]"
l_59 = "[XS:steltalk,1][C:16]Stella:[C:C] But regulations and laws didn't allow #that kind of technology near civilians.[STOPLIP:]"
l_60 = "[XS:jilltalk,1][C:13]Jill:[C:C] I guess even Zaibatsu Corp has its #limits, huh.[STOPLIP:]"
l_61 = "[XS:steltalk,1][C:16]Stella:[C:C] People love to demonize Zaibatsu #Corp. because, let's face it, they're far #from innocent.[STOPLIP:]"
l_62 = "[XS:steltalk,1][C:16]Stella:[C:C] But they're not evil overlords, #they're just... greedy. They're just a big #corporation.[STOPLIP:]"
l_63 = "[XS:steltalk,1][C:16]Stella:[C:C] They just so happen to have control #over what tantamounts to a city-state.[STOPLIP:]"
l_64 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] But corporations will naturally #resort to draconian methods.[STOPLIP:]"
l_65 = "[XS:steltalk,1][C:16]Stella:[C:C] I've heard horror stories from people #outside the city about trying to use product #placement.[STOPLIP:]"
l_66 = "[XS:steltalk,1][C:16]Stella:[C:C] If you so much as hold a bottle the #wrong way or get in the way of a logo, #you'll be in for lots of trouble.[STOPLIP:]"
l_67 = "[XS:steltalk,1][C:16]Stella:[C:C] And let's not start with theme parks #or the like. Those are dystopias of their #own.[STOPLIP:]"
l_68 = "[XS:jilltalk,1][C:13]Jill:[C:C] Then again, most of the INI_QUOTSdemonizationINI_QUOTS #is due to QUINCY being such a clown.[STOPLIP:]"
l_69 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] He has no power anyways. [STOPLIP:]"
l_70 = "[XS:steltalk,1][C:16]Stella:[C:C] He's just the front that whatever #council behind Zaibatsu Corp. chose.[STOPLIP:]"
l_71 = "[XS:steltalk,1][C:16]Stella:[C:C] He makes a fool of himself and the #attention is taken away from whatever it is #that Zaibatsu Corp is actually doing.[STOPLIP:]"
l_72 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* Yeah.[STOPLIP:]"
