l_23 = "[XS:steltalk,1][C:16]Stella:[C:C] ...sorry.[STOPLIP:]"
l_24 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] After the events at the bank, the #suits were remotely shut down, bricking #many of them in the process.[STOPLIP:]"
l_25 = "[XS:steltalk,1][C:16]Stella:[C:C] Many units dropped their armor #right there and fled when the lynchings #went on.[STOPLIP:]"
l_26 = "[XS:steltalk,1][C:16]Stella:[C:C] Any White Knight still stuck in #their suit had to take the armor off #manually to run away.[STOPLIP:]"
l_27 = "[XS:steltalk,1][C:16]Stella:[C:C] It all happened in the middle of #the lynchings, so they'd be sitting ducks #if they didn't.[STOPLIP:]"
l_28 = "[XS:steltalk,1][C:16]Stella:[C:C] Some weren't that lucky. They got #beaten up while they weren't able to move.[STOPLIP:]"
l_29 = "[XS:steltalk,1][C:16]Stella:[C:C] So, between the suits becoming #glorified paperweights, and many White #Knights going on the run...[STOPLIP:]"
l_30 = "[XS:steltalk,1][C:16]Stella:[C:C] There ended up being a lot of #junk lying around.[STOPLIP:]"
l_31 = "[XS:steltalk,1][C:16]Stella:[C:C] But the whole scientific community is #rejoicing.[STOPLIP:]"
