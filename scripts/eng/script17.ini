l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Say, Alma, speaking of the past. #What was your last long-term #relationship like?[STOPLIP:]"
l_2 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C] That's sudden.[STOPLIP:]"
