l_21 = "[XS:almatalk,1][C:14]Alma:[C:C] We got along pretty well, we had #awesome chemistry, I... truly loved him.[STOPLIP:]"
l_22 = "[XS:almatalk,1][C:14]Alma:[C:C] But as time went by, there was a #rift that started separating us.[STOPLIP:]"
l_23 = "[XS:almatalk,1][C:14]Alma:[C:C] He just didn't like my family.[STOPLIP:]"
