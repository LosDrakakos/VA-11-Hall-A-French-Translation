l_17 = "[XS:steltalk,1][C:16]Stella:[C:C] All that power makes you think #you're above every law there is.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] And this city is what happens when #those with money start making the rules.[STOPLIP:]"
