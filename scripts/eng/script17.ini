l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...wait.[STOPLIP:]"
l_2 = "[XS:steltalk,1][C:16]Stella:[C:C] Hm?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] I just realized something's off with #the whole tech gold rush story.[STOPLIP:]"
l_4 = "[XS:steltalk,1][C:16]Stella:[C:C] What would it be?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Wouldn't all that tech be patented #anyways? I get trying to crack it in #the first place, but...[STOPLIP:]"
