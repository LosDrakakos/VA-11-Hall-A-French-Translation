l_3 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Bien sûr, demande donc.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C]A quel âge t'as eu ces implants dans tes #nichons?[STOPLIP:]"
l_5 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C]...[STOPLIP:]"
l_6 = "[XS:almatalk,1][C:14]Alma:[C:C]Jill, je t'aime et je sais que tu dis ça pour #plaisanter...[STOPLIP:]"
l_7 = "[XS:almaface,serious][XS:almatalk,1][C:14]Alma:[C:C]Mais j'ai encaissé tellement de rumeurs #comme quoi j'aurais fait appel à la chirurgie #plastique, que je ne peux pas et ne prendrai #jamais cela à la légère.[STOPLIP:]"
l_8 = "[XS:almatalk,1][C:14]Alma:[C:C]En conséquence, et pour honorer notre amitié, #je me contenterai de dire cela...[STOPLIP:]"
l_9 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Ils sont réels, et ils sont spectaculaires.[STOPLIP:]"
l_10 = "[XS:almaface,serious][XS:almatalk,1][C:14]Alma:[C:C]Maintenant pose moi la vraie question avant #que je ne te colle une baffe.[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C]Je te donnerai donc une, et j'ai bien dit #seulement une chance de m'appeler par mon vrai #prénom en guise de compensation, dans ce cas.[STOPLIP:]"
l_12 = "[XS:almaface,smile][XS:almatalk,1][C:14]Alma:[C:C]J'accepte l'offre avec gratitude.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C]C'est marrant que tu parles de coller des #baffes parce que ma vraie question c'était, #pourquoi tu t'es tranchée les mains?[STOPLIP:]"
l_14 = "[XS:almatalk,1][C:14]Alma:[C:C]Héhéhé... tranché.[STOPLIP:]"
l_15 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Eh bien, y'a quelques raisons à ça.[STOPLIP:]"
l_16 = "[XS:almatalk,1][C:14]Alma:[C:C]La première c'est que je passe beaucoup de #temps à taper, et ces prothèses m'aident à #éviter d'avoir le syndrôme du canal carpien.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C]Oh.[STOPLIP:]"
l_18 = "[XS:almatalk,1][C:14]Alma:[C:C]Il y a plein d'autres utilisations. Du genre, #je peux agir sur par mal d'appareils.[STOPLIP:]"
l_19 = "[XS:almatalk,1][C:14]Alma:[C:C]Par exemple, il y a un petit ordinateur #intégré dans mes lunettes.[STOPLIP:]"
l_20 = "[XS:almatalk,1][C:14]Alma:[C:C]Si je bouge l'index, il agit en tant que #curseur pour mon ordinateur.[STOPLIP:]"
l_21 = "[XS:almatalk,1][C:14]Alma:[C:C]Il y a plus, mais ce sont de petits détails #qui ne semblent pas si impressionant que ça quand #j'en parle.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C]Comment ta famille a réagi vis à vis de #l'operation?[STOPLIP:]"
l_23 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C]Ils l'ont plutôt bien pris... à part ma #maman. Elle a eu la trouille pendant plusieurs #mois.[STOPLIP:]"
l_24 = "[XS:almatalk,1][C:14]Alma:[C:C]Elle est même allée à l'hôpital pour réclamer #mes mains.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C]Elles ne te manquent pas?[STOPLIP:]"
l_26 = "[XS:almaface,concern][XS:almatalk,1][C:14]Alma:[C:C]Quelques fois, mais juste quand je suis #émotive. Mais le hasard faisant bien les choses, #quelqu'un les a prises.[STOPLIP:]"
l_27 = "[XS:almatalk,1][C:14]Alma:[C:C]Peu de temps avant mon opération, il y a eu #un accident sur l'autoroute.[STOPLIP:]"
l_28 = "[XS:almatalk,1][C:14]Alma:[C:C]Une des victimes était une jeune femme dont #la main droite a été complètement broyée.[STOPLIP:]"
l_29 = "[XS:almatalk,1][C:14]Alma:[C:C]Je leur ai dit de vérifier si nous étions #compatibles et tout.[STOPLIP:]"
l_30 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Je veux dire, les implants ne sont pas le #premier choix de tout le monde si on peut avoir #une prothèse naturelle.[STOPLIP:]"
l_31 = "[XS:almatalk,1][C:14]Alma:[C:C]Un peu de traitement cosmétique et on pourrait #croire que c'est sa main originale sans problèmes.[STOPLIP:]"
l_32 = "[XS:almatalk,1][C:14]Alma:[C:C]Aux dernières nouvelles nous étions #compatibles et la famille a accepté le don.[STOPLIP:]"
l_33 = "[XS:almaface,smile][XS:almatalk,1][C:14]Alma:[C:C]J'ignore ce qui lui est arrivée, mais #j'espère qu'elle va bien.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C]Et tu n'as rien dit à ta maman à ce sujet?[STOPLIP:]"
l_35 = "[XS:almaface,confused][XS:almatalk,1][C:14]Alma:[C:C]Je ne voulais pas qu'elle harcèle cette #pauvre fille.[STOPLIP:]"
l_36 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Donc, tout est cool maintenant? On est #quittes?[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C]On devrait? T'avais l'air plutôt furax après #mon commentaire sur tes seins.[STOPLIP:]"
l_38 = "[XS:jilltalk,1][C:13]Jill:[C:C]Encore une fois, désolée. Ça sonnait pas #aussi impoli dans ma tête.[STOPLIP:]"
l_39 = "[XS:almatalk,1][C:14]Alma:[C:C]Ouais, t'inquiète pas pour ça.[STOPLIP:]"
l_40 = "[XS:almaface,smile][XS:almatalk,1][C:14]Alma:[C:C]En plus, ça me permet de t'appeler Julianne #au moins une fois.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C]Plus maintenant.[STOPLIP:]"
l_42 = "[XS:almaface,serious][XS:almatalk,1][C:14]Alma:[C:C]Hein? Pourquoi?[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C]Tu viens de m'appeler avec mon vrai prénom.[STOPLIP:]"
l_44 = "[XS:almaface,confused][XS:almatalk,1][C:14]Alma:[C:C]...t'es sérieuse?[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C]Une chance rien qu'une, et tu viens juste #de la cramer.[STOPLIP:]"
l_46 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C]Chiotte![STOPLIP:]"
l_47 = "[CHANNEL:6][SHOW:120,sprite_anna][XS:anface,happy][XS:antalk,1][C:41]Anna:[C:C]Surprise![STOPLIP:]"
l_48 = "[XS:jilltalk,1][C:13]Jill:[C:C]...[STOPLIP:]"
l_49 = "[XS:jilltalk,1][C:13]Jill:[C:C]Hé Alma, rien à voir avec ce qu'on disait, #mais... tu crois aux fantômes?[STOPLIP:]"
l_50 = "[XS:anface,smug][XS:antalk,1][C:41]Anna:[C:C]Hé![STOPLIP:]"
l_51 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C]Pas particulièrement, non.[STOPLIP:]"
l_52 = "[XS:almatalk,1][C:14]Alma:[C:C]Quoique il y a bien eu cet article que j'ai #lu auparavant qui était très intéressant.[STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C]Hmm?[STOPLIP:]"
l_54 = "[XS:almatalk,1][C:14]Alma:[C:C]Il était question d'un scénario selon lequel #des amas de nanomachine quitteraient le corps #après la mort. [STOPLIP:]"
l_55 = "[XS:almatalk,1][C:14]Alma:[C:C]Et agirait ensuite en esprit de ruche #collectif à travers les ondes cérébrales #résiduelles.[STOPLIP:]"
l_56 = "[XS:almatalk,1][C:14]Alma:[C:C]Le résultat donnerait une image pas si #différente d'un hologramme.[STOPLIP:]"
l_57 = "[XS:almatalk,1][C:14]Alma:[C:C]Bien sûr, l'hypothèse n'a pas fait long feu #en particulier parce que une telle densité de #nanomachines est imposible dans un corps.[STOPLIP:]"
l_58 = "[XS:almatalk,1][C:14]Alma:[C:C]Même 5% de la quantité nécessaire est suffisante #pour rendre le sang trop dense pour le coeur.[STOPLIP:]"
l_59 = "[XS:almatalk,1][C:14]Alma:[C:C]Et ce n'est pas comme si les ondes cérébrales #étaient assez puissantes pour créer ce genre de #réactions.[STOPLIP:]"
l_60 = "[XS:almatalk,1][C:14]Alma:[C:C]C'était intéressant comme lecture, toutefois.[STOPLIP:]"
l_61 = "[XS:jilltalk,1][C:13]Jill:[C:C]Je vois.[STOPLIP:]"
l_62 = "[XS:jilltalk,1][C:13]Jill:[C:C]Hmm...[STOPLIP:]"
l_63 = "[XS:antalk,1][C:41]Anna:[C:C]Ne me regarde pas comme ça. C'est pas ma #faute si tu t'es convaincue toi-même que t'es #folle.[XS:anhide,1][STOPLIP:][CHANGE:]"
l_64 = "[XS:almatalk,1][C:14]Alma:[C:C]Bref, j'y vais. #On se voit demain.[STOPLIP:]"
