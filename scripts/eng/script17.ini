l_14 = "[XS:steltalk,1][C:16]Stella:[C:C] The irony runs deep, wouldn't you #say?[STOPLIP:]"
l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] Why do it though?[STOPLIP:]"
