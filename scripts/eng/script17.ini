l_16 = "[XS:almatalk,1][C:14]Alma:[C:C] The other guy, I met shortly after I #dropped out.[STOPLIP:]"
l_17 = "[XS:almatalk,1][C:14]Alma:[C:C] He was interested in marriage, but #he wanted to get married after only half a #year or so of knowing him.[STOPLIP:]"
l_18 = "[XS:almaface,sigh][XS:almatalk,1][C:14]Alma:[C:C] ...and then there's Richard.[STOPLIP:]"
