l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C]Si vous avez besoin de personnel de #nettoyage, c'est une bonne pioche.[STOPLIP:]"
l_11 = "[XS:steltalk,1][C:16]Stella:[C:C]Vraiment?[STOPLIP:]"
l_12 = "[XS:giltalk,1][C:19]Gillian:[C:C]...[STOPLIP:]"
l_13 = "[XS:giltalk,1][C:19]Gillian:[C:C]Hm... hmhmhm...[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C]Il est un petit peu dans les choux #aujourd'hui, toutefois.[STOPLIP:]"
l_15 = "[XS:steltalk,1][C:16]Stella:[C:C]Je vois.[STOPLIP:]"
l_16 = "[XS:steltalk,1][C:16]Stella:[C:C]Hé Jill, vous avez entendu parler de la #nouvelle ruée vers l'or dans la ville?[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C]Ruée vers l'or?[STOPLIP:]"
l_18 = "[XS:steltalk,1][C:16]Stella:[C:C]Tout le monde paye de petites fortunes pour #mettre la main sur des pièces d'équipement des #Chevaliers Blancs.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C]Je crois que j'ai entendu ou lu des choses à #ce sujet? Mais j'ai des doutes, donc sans doute #pas.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C]Dans tous les cas, en quoi est-ce une ruée #vers l'or?[STOPLIP:]"
l_21 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C]Eh bien, la technologie des ensembles a #toujours été très bien gardée, mais après les #événements à la banque...[STOPLIP:]"
l_22 = "[XS:steltalk,1][C:16]Stella:[C:C]...[STOPLIP:]"
l_23 = "[XS:steltalk,1][C:16]Stella:[C:C]...désolée.[STOPLIP:]"
l_24 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C]Après les événements à la banque, les #ensembles ont été désactivés à distance, ce qui #en a gelé plusieurs par la même occasion.[STOPLIP:]"
l_25 = "[XS:steltalk,1][C:16]Stella:[C:C]Plusieurs unités ont laissé leurs armures #sur place et pris la fuite lorsque les lynchages #ont eu lieu.[STOPLIP:]"
l_26 = "[XS:steltalk,1][C:16]Stella:[C:C]Les Chevaliers Blancs encore coincés dans leurs #armures ont dû les enlever manuellement pour fuir.[STOPLIP:]"
l_27 = "[XS:steltalk,1][C:16]Stella:[C:C]Ça s'est déroulé en plein milieu des #lynchages, ils auraient été des proies faciles #s'ils ne l'avaient pas fait.[STOPLIP:]"
l_28 = "[XS:steltalk,1][C:16]Stella:[C:C]D'autres n'ont pas eu cette chance. Ils ont #été passés à tabac alors qu'ils ne pouvaient pas #bouger.[STOPLIP:]"
l_29 = "[XS:steltalk,1][C:16]Stella:[C:C]Du coup, les ensembles sont devenus de #splendides presse-papiers, et avec plusieurs #Chevaliers Blancs en cavale...[STOPLIP:]"
l_30 = "[XS:steltalk,1][C:16]Stella:[C:C]Ils ont fini par devenir un gros tas de #saletés dispersées partout.[STOPLIP:]"
l_31 = "[XS:steltalk,1][C:16]Stella:[C:C]Mais l'ensemble de la communauté #scientifique exulte.[STOPLIP:]"
l_32 = "[XS:steltalk,1][C:16]Stella:[C:C]Il y a une véritable course à la rétro-#ingénierie des équipements afin de pouvoir #s'accaparer le plus de technologie possible.[STOPLIP:]"
l_33 = "[XS:steltalk,1][C:16]Stella:[C:C]Eh bien sûr, la moindre pièce des armures se #négocie à prix d'or ces jours-ci.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C]N'importe qui pourrait donc tirer profit de #ces recherches au point de justifier de telles #dépenses?[STOPLIP:]"
l_35 = "[XS:steltalk,1][C:16]Stella:[C:C]C'est de la nouvelle technologie, un #nouveau champ de découverte truffé de brevets qui #n'attendent que d'être cueillis. Donc je dirais #oui.[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C]Heu...[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C]Je veux dire, la BTC est littéralement un #conglomérat bâti sur des brevets et des marques #déposées, je peux voir dans quelle mesure.[STOPLIP:]"
l_38 = "[XS:steltalk,1][C:16]Stella:[C:C]Il y a juste un cas bizarre...[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C]Hmm?[STOPLIP:]"
l_40 = "[XS:steltalk,1][C:16]Stella:[C:C]Il y a ce type nommé Jack. Il est le #capitaine d'une unité de Blitzkrieg Corps très #spéciale.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C]Spéciale?[STOPLIP:]"
l_42 = "[XS:steltalk,1][C:16]Stella:[C:C]L'unité de ce type est très réduite. #Cinq personne, lui inclus.[STOPLIP:]"
l_43 = "[XS:steltalk,1][C:16]Stella:[C:C]Le style esthétique des armures de cette #unité a été modifiée en profondeur au point qu'ils #ressemblent à un escadron de Henshin Heroes.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C]Hein quoi?[STOPLIP:]"
