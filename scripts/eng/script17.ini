l_8 = "[XS:steltalk,1][C:16]Stella:[C:C] Zaibatsu have been so paranoid about #making the White Knights untouchable that #they never patented anything.[STOPLIP:]"
l_9 = "[XS:steltalk,1][C:16]Stella:[C:C] A patent would be in a database #that someone could hack and retrieve #valuable info from.[STOPLIP:]"
