l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] In any case, how is it a gold rush?[STOPLIP:]"
l_21 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] Well, the tech behind the suits was #always safely guarded, but after the events #at the bank...[STOPLIP:]"
