[19]
l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, what's up now?[STOPLIP:]"
l_2 = "[XS:arttalk,1][C:26]Art:[C:C] A bit of holiday blues, you could say.[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] So you celebrate Mega Christmas?[STOPLIP:]"
l_4 = "[XS:artface,][XS:arttalk,1][C:26]Art:[C:C] Why wouldn't I?[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] You looked more like a Festivus kind #of guy.[STOPLIP:]"
l_6 = "[XS:arttalk,1][C:26]Art:[C:C] Why does everyone keep saying that?![STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, Festivus IS a celebration #going against the capitalist madness that #is Mega Christmas.[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] (And you know... cheapskate.)[STOPLIP:]"
l_9 = "[XS:arttalk,1][C:26]Art:[C:C] If you have something to say, say it.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'll refrain. [STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Although now that I think about it, #INI_QUOTSholiday bluesINI_QUOTS is not really tied to a #specific celebration.[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] Just the season.[STOPLIP:]"
l_13 = "[XS:arttalk,1][C:26]Art:[C:C] A season of consumerist craze.[STOPLIP:]"
l_14 = "[XS:arttalk,1][C:26]Art:[C:C] Mega Christmas is just a mockery of #what the real Christmas once was.[STOPLIP:]"
l_15 = "[XS:arttalk,1][C:26]Art:[C:C] I mean, the season has slowly become #enslaved to the corporations over time.[STOPLIP:]"
l_16 = "[XS:arttalk,1][C:26]Art:[C:C] INI_QUOTSHoliday spiritINI_QUOTS can only be #manipulated so much.[STOPLIP:]"
l_17 = "[XS:arttalk,1][C:26]Art:[C:C] But then came that Turbo Male guy. He #started a yearly tradition of dressing up #like Santa in the ring.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Turbo Male? That can't be his ring #name.[STOPLIP:]"
l_19 = "[XS:arttalk,1][C:26]Art:[C:C] It is.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] Really? Such a tacky name was #accepted?[STOPLIP:]"
l_21 = "[XS:arttalk,1][C:26]Art:[C:C] His partner was Buster Master and his #rival was Dr. Chris Max. Tacky names were #not a problem.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, I knew there was a wrestler #that dressed as Santa every year.[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] I also knew that the guy became #insanely popular and the stunt got out of #control.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] And, of course, that's the part #everyone sings about.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Santa became Nega Santa thanks to the #Redmond Family.[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Nega Santa sees the error of his #ways and becomes the mighty Mega Santa, #renaming the holiday Mega Christmas.[STOPLIP:]"
l_27 = "[XS:arttalk,1][C:26]Art:[C:C] And then every company jumped on the #bandwagon and Christmas was Mega Christmas #before anyone noticed.[STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] So you're telling me that the guy #who somehow managed to rename the #holiday...[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] Went by the ring name INI_QUOTSTurbo MaleINI_QUOTS?[STOPLIP:]"
l_30 = "[XS:arttalk,1][C:26]Art:[C:C] Yup.[STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] That makes the whole holiday sound #like a joke.[STOPLIP:]"
l_33 = "[XS:arttalk,1][C:26]Art:[C:C] The holiday IS a joke.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] And you're telling me you don't #celebrate Festivus?[STOPLIP:]"
l_35 = "[XS:artface,sigh][XS:arttalk,1][C:26]Art:[C:C] *sigh* No, I don't.[STOPLIP:]"
l_36 = "[XS:arttalk,1][C:26]Art:[C:C] Do you know what kind of people #celebrate Festivus?[STOPLIP:]"
l_37 = "[XS:arttalk,1][C:26]Art:[C:C] The kind that's so lame and bland #that they can only talk about how they're #better because they celebrate Festivus.[STOPLIP:]"
l_38 = "[XS:arttalk,1][C:26]Art:[C:C] Like those jerks who only eat Nuke #and think they're better than everyone #else.[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] I see...[STOPLIP:]"
