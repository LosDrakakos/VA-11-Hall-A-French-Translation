[22]
l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Okay, we both know it's not holiday #blues. Why are you so down?[STOPLIP:]"
l_2 = "[XS:arttalk,1][C:26]Art:[C:C] Why so interested? Are you hitting on #me?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] Nah, just bored.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] Besides, you could be my dad. I'd #never hit on you.[STOPLIP:]"
l_5 = "[XS:arttalk,1][C:26]Art:[C:C] You'd be surprised by the amount of #girls that are into older men.[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] Let me rephrase it: I'd never hit on #you. Period.[STOPLIP:]"
l_7 = "[XS:arttalk,1][C:26]Art:[C:C] Whatever, I'm married, anyway.[STOPLIP:]"
l_8 = "[XS:arttalk,1][C:26]Art:[C:C] So you wanna know why I'm feeling #down?[STOPLIP:]"
l_9 = "[XS:jilltalk,1][C:13]Jill:[C:C] If you don't want to tell me, it's #okay.[STOPLIP:]"
l_10 = "[XS:arttalk,1][C:26]Art:[C:C] Nah, there's no problem.[STOPLIP:]"
l_11 = "[XS:arttalk,1][C:26]Art:[C:C] Well, you see. I found the girl I was #looking for...[STOPLIP:]"
l_12 = "[XS:arttalk,1][C:26]Art:[C:C] ...in her last moments.[STOPLIP:]"
l_13 = "[XS:jilltalk,1][C:13]Jill:[C:C] Huh... really?[STOPLIP:]"
l_14 = "[XS:arttalk,1][C:26]Art:[C:C] I followed her tracks and finally #found her. Although to be fair, it's more #like she stopped trying to cover them.[STOPLIP:]"
l_15 = "[XS:arttalk,1][C:26]Art:[C:C] She was just sitting in a room near #some more corpses. From what I gathered #later, seems it was some drug lab.[STOPLIP:]"
l_16 = "[XS:arttalk,1][C:26]Art:[C:C] She passed herself off as a #prostitute, and then proceeded to #kill everyone inside.[STOPLIP:]"
l_17 = "[XS:arttalk,1][C:26]Art:[C:C] When I found her, she was drugged to #hell and back.[STOPLIP:]"
l_18 = "[XS:arttalk,1][C:26]Art:[C:C] According to what little I could get #out of her, she was dying.[STOPLIP:]"
l_19 = "[XS:arttalk,1][C:26]Art:[C:C] Seems the same rejection she used to #kill her targets was also killing her too.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] You mentioned she caused a #Nanomachine Rejection of sorts, right?[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] So I'm guessing the city's #nanomachines seeped into her body, causing #a reaction.[STOPLIP:]"
l_22 = "[XS:artface,sigh][XS:arttalk,1][C:26]Art:[C:C] As a psycho-for-hire, you'd think #she'd have had the foresight to think #about that before coming into the city.[STOPLIP:]"
l_23 = "[XS:arttalk,1][C:26]Art:[C:C] But anyway, I had a job to do, so I #delivered her letter.[STOPLIP:]"
l_24 = "[XS:arttalk,1][C:26]Art:[C:C] ...only for her to tear it apart #without reading it.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Must've been frustrating, huh?[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, all that work for her to rip #it to pieces.[STOPLIP:]"
l_27 = "[XS:arttalk,1][C:26]Art:[C:C] I thought something like that might #happen. [STOPLIP:]"
l_28 = "[XS:arttalk,1][C:26]Art:[C:C] To be honest, at that point, I was #really just doing it for my own sense of #peace. [STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] Why tear the letter, though?[STOPLIP:]"
l_30 = "[XS:artface,][XS:arttalk,1][C:26]Art:[C:C] Apparently, the guy wasn't exactly #the best father out there.[STOPLIP:]"
l_31 = "[XS:arttalk,1][C:26]Art:[C:C] She was born for experimental #purposes. A living guinea pig for her #father's condition.[STOPLIP:]"
l_32 = "[XS:arttalk,1][C:26]Art:[C:C] He was literally going to use her to #test any treatment, no matter how #unorthodox.[STOPLIP:]"
l_33 = "[XS:arttalk,1][C:26]Art:[C:C] She was experimented upon from an #early age. And when she found out what her #blood was capable of, she just... snapped.[STOPLIP:]"
l_34 = "[XS:arttalk,1][C:26]Art:[C:C] In her own words, INI_QUOTSI didn't have to #take shit from anyone anymore, not even my #'father'INI_QUOTS.[STOPLIP:]"
l_35 = "[XS:arttalk,1][C:26]Art:[C:C] So she ran away, came to the city. #Became a gun for hire...[STOPLIP:]"
l_36 = "[XS:arttalk,1][C:26]Art:[C:C] Got trapped in that bank. Then, the #rejection started to kick in...[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] Tough stuff.[STOPLIP:]"
l_38 = "[XS:arttalk,1][C:26]Art:[C:C] It hit me hard, you know? I kinda saw #my own daughter in her at that moment.[STOPLIP:]"
l_39 = "[XS:arttalk,1][C:26]Art:[C:C] The anger she bore against this old #man...[STOPLIP:]"
l_40 = "[XS:arttalk,1][C:26]Art:[C:C] I've seen it before. Many times while #my daughter was a teen.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] Really?[STOPLIP:]"
l_42 = "[XS:arttalk,1][C:26]Art:[C:C] She... my daughter was born as a boy. #And back then, spent all her time angry.[STOPLIP:]"
l_43 = "[XS:arttalk,1][C:26]Art:[C:C] I had a short fuse, so I lost control #with her more often than not.[STOPLIP:]"
l_44 = "[XS:arttalk,1][C:26]Art:[C:C] I yelled at her, she yelled at me...[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_46 = "[XS:artface,sigh][XS:arttalk,1][C:26]Art:[C:C] When she turned 11, she started her #transition process. Her behaviour changed #a lot.[STOPLIP:]"
l_47 = "[XS:arttalk,1][C:26]Art:[C:C] She was calmer, friendlier... but my #relationship with her was already #fractured.[STOPLIP:]"
l_48 = "[XS:arttalk,1][C:26]Art:[C:C] It wasn't until a couple of years ago #that she decided to give me a second #chance.[STOPLIP:]"
l_49 = "[XS:arttalk,1][C:26]Art:[C:C] I've been doing my best to make #amends, but I still remember the anger on #her face.[STOPLIP:]"
l_50 = "[XS:arttalk,1][C:26]Art:[C:C] And to see that girl, in her death #throes, with that same look...[STOPLIP:]"
l_51 = "[XS:arttalk,1][C:26]Art:[C:C] ...[STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe you shouldn't be here then.[STOPLIP:]"
l_53 = "[XS:arttalk,1][C:26]Art:[C:C] Huh?[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe you should be with your #daughter, preventing that stuff from ever #happening again.[STOPLIP:]"
l_55 = "[XS:jilltalk,1][C:13]Jill:[C:C] You finished your job. Take your #lesson to heart and go spend time with her.[STOPLIP:]"
l_56 = "[XS:jilltalk,1][C:13]Jill:[C:C] Not everyone gets second chances, so #don't waste it.[STOPLIP:]"
