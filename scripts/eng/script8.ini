l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] Want one?[STOPLIP:][SHOW:0,codec_cigar]"
l_2 = "[XS:seitalk,1][C:17]Sei:[C:C] Sorry, I haven't smoked since high #school.[STOPLIP:]"
l_3 = "[XS:seitalk,1][C:17]Sei:[C:C] But don't mind me though. Smoke ahead.[STOPLIP:]"
l_4 = "[XS:jilltalk,1][C:13]Jill:[C:C] Thanks.[STOPLIP:][XS:codechide,1]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] So... why me?[STOPLIP:]"
l_6 = "[XS:seitalk,1][C:17]Sei:[C:C] You're the closest friend I have nearby #that isn't avoiding me and.. and I think #I'm about to explode.[STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Why?[STOPLIP:]"
l_8 = "[XS:seitalk,1][C:17]Sei:[C:C] B-B-Because I'm afraid! I'm terrified! #I'm scared![STOPLIP:]"
l_9 = "[XS:seitalk,1][C:17]Sei:[C:C] My colonel was using me when I made #that errand, he saw me as a disposable pawn![STOPLIP:]"
l_10 = "[XS:seitalk,1][C:17]Sei:[C:C] Then the whole thing got closed at the #bank. [STOPLIP:]"
l_11 = "[XS:seitalk,1][C:17]Sei:[C:C] We were stuck there with no food or #water for three days![STOPLIP:]"
l_12 = "[XS:seitalk,1][C:17]Sei:[C:C] I-I saw a man be beaten to death after #he found some snack in his pocket... that... #that...[STOPLIP:]"
l_13 = "[XS:seitalk,1][C:17]Sei:[C:C] I... I...[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_15 = "[XS:seitalk,1][C:17]Sei:[C:C] When I was in rescue duties I usually #dealt with collapsing buildings, fire, #that kind of stuff.[STOPLIP:]"
l_16 = "[XS:seitalk,1][C:17]Sei:[C:C] B-But seeing people do that to other #people is just...[STOPLIP:]"
l_17 = "[XS:seitalk,1][C:17]Sei:[C:C] I... *sniff* I...[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] Calm down, nobody will hurt you here.[STOPLIP:]"
l_19 = "[XS:seitalk,1][C:17]Sei:[C:C] You sure?[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'll make sure of it, just... take #deep breaths.[STOPLIP:]"
l_21 = "[XS:seitalk,1][C:17]Sei:[C:C] ...[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] I can't even imagine what happened #there. And truth be told, I don't want to #imagine it.[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] But it's easy to tell you bottled up #everything while you were there.[STOPLIP:]"
l_24 = "[XS:seitalk,1][C:17]Sei:[C:C] Is it obvious?[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] Kinda.[STOPLIP:]"
l_26 = "[XS:seitalk,1][C:17]Sei:[C:C] Well, I had to get outta there. Fear #would've only gotten in the way.[STOPLIP:]"
l_27 = "[XS:seitalk,1][C:17]Sei:[C:C] And besides, I made a promise to come #back to...[STOPLIP:]"
l_28 = "[XS:seitalk,1][C:17]Sei:[C:C] Err...[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] Alright, what's the deal with Stella?[STOPLIP:]"
l_30 = "[XS:seitalk,1][C:17]Sei:[C:C] Nothing, I'm just... [STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] Afraid?[STOPLIP:]"
l_32 = "[XS:seitalk,1][C:17]Sei:[C:C] The word loses meaning after using it #so much in so little time.[STOPLIP:]"
l_33 = "[XS:seitalk,1][C:17]Sei:[C:C] She should've been worried sick, and I #couldn't call her after I came back. I'm #afraid of what she will say.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] She will insult you, she looks like #that kind of girl.[STOPLIP:]"
l_35 = "[XS:jilltalk,1][C:13]Jill:[C:C] But I'm betting all I have that she #will be quickly happy that you're fine and #alive.[STOPLIP:]"
l_36 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah... you're right.[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] Think about it this way: A slap or #despair for what's left of her life.[STOPLIP:]"
l_38 = "[XS:seitalk,1][C:17]Sei:[C:C] I wouldn't pretend to disappear, I #mean...[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] Besides, from what you tell me you're #pretty much only coming to your senses #today, right?[STOPLIP:]"
l_40 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah.[STOPLIP:]"
l_41 = "[XS:seitalk,1][C:17]Sei:[C:C] It's weird how everything can change in #such a short notice, you know?[STOPLIP:]"
l_42 = "[XS:seitalk,1][C:17]Sei:[C:C] On Thursday I was a girl doing her #duties minding only her own business.[STOPLIP:]"
l_43 = "[XS:seitalk,1][C:17]Sei:[C:C] Now I'm injured and woke up to find out #I can't go back to those duties.[STOPLIP:]"
l_44 = "[XS:seitalk,1][C:17]Sei:[C:C] Part of me is happy, I knew full well #White Knights usually did more harm than #good.[STOPLIP:]"
l_45 = "[XS:seitalk,1][C:17]Sei:[C:C] On the other hand, I really loved my #job. Now I'm stuck with nothing to do.[STOPLIP:]"
l_46 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, I know how that is. The life #changing on such short notice part, I #mean.[STOPLIP:]"
l_47 = "[XS:seitalk,1][C:17]Sei:[C:C] Really?[STOPLIP:]"
l_48 = "[XS:jilltalk,1][C:13]Jill:[C:C] I would tell you why I know that, but #I think you should go see Stella right #now.[STOPLIP:]"
l_49 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah, you're right.[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] Speaking of which... Hey Gil![STOPLIP:]"
l_51 = "[XS:giltalk,1][C:19]Gillian:[C:C] What?[STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] Do me a favor and escort Sei to... #wherever she needs to go, please.[STOPLIP:]"
l_53 = "[XS:giltalk,1][C:19]Gillian:[C:C] Only if you cover my share of the #work.[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yeah, yeah...[STOPLIP:]"
l_55 = "[XS:giltalk,1][C:19]Gillian:[C:C] Okay then. Let's go Miss.[STOPLIP:]"
l_56 = "[XS:seitalk,1][C:17]Sei:[C:C] R-Right![STOPLIP:]"
