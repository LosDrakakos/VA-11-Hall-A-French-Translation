l_9 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Ah yes, I know a good way to change #the subject a bit.[STOPLIP:]"
l_10 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Would you like to hear about the most #dangerous bounty hunter in the city?[STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] The way you said that was like offering #a tale to a bored kid. But yeah, I'd like to #hear that one.[STOPLIP:]"
l_12 = "[XS:jamietalk,1][C:23]Jamie:[C:C] You see, there was actually a #bounty hunter organization in this city #not too long ago.[STOPLIP:]"
l_13 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Law enforcement would put a price #on a dangerous person's head and pay #for the proof of that person's death.[STOPLIP:]"
l_14 = "[XS:jamietalk,1][C:23]Jamie:[C:C] There was a guy everyone called Jet #Black James. He got the nickname because #he always wore black clothes.[STOPLIP:]"
l_15 = "[XS:jamietalk,1][C:23]Jamie:[C:C] The interesting thing was that the #black clothes were there to hide blood #stains he got from his contracts.[STOPLIP:]"
l_16 = "[XS:jamietalk,1][C:23]Jamie:[C:C] His tracking skills were top-notch, #his information network was the best. [STOPLIP:]"
l_17 = "[XS:jamietalk,1][C:23]Jamie:[C:C] Some even joked he would finish #the bounty within half an hour, or #he wouldn't take the reward.[STOPLIP:]"
l_18 = "[XS:jamietalk,1][C:23]Jamie:[C:C] ...he was too good, in fact.[STOPLIP:]"
l_19 = "[XS:jamietalk,1][C:23]Jamie:[C:C] At one point he took all bounties and #didn't take a single reward. He was just #that crazy by then.[STOPLIP:]"
l_20 = "[XS:jamietalk,1][C:23]Jamie:[C:C] The last bounty that the #organization ever posted was on James' #head.[STOPLIP:]"
l_21 = "[XS:jamietalk,1][C:23]Jamie:[C:C] The police had him cornered. His last #words were INI_QUOTSSend it all to my accountINI_QUOTS #before shooting himself.[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] Damn... why hasn't that been made into #a movie?[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] So... there were no more bounties after #that?[STOPLIP:]"
l_24 = "[XS:jamietalk,1][C:23]Jamie:[C:C] A registered bounty hunter was #charged with many counts of manslaughter #using his old targets as proof.[STOPLIP:]"
l_25 = "[XS:jamietalk,1][C:23]Jamie:[C:C] If somebody else tried to recreate #the organization, the seed of doubt would #grow in little to no time.[STOPLIP:]"
