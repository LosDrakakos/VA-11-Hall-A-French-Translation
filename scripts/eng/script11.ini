l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] What if I had a sudden realization #like the one I had at graduation, but when #I turned 40?[STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] I didn't know what to do, but I sure #as hell wasn't taking that offer.[STOPLIP:]"
