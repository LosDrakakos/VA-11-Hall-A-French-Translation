l_15 = "[XS:jilltalk,1][C:13]Jill:[C:C] INI_QUOTSWatching people is fine, but #talking to them is better,INI_QUOTS she would say.[STOPLIP:]"
l_16 = "[XS:jilltalk,1][C:13]Jill:[C:C] Lenore would always present me to #her many acquaintances as INI_QUOTSthe girl I #don't mind cuddling with for hoursINI_QUOTS.[STOPLIP:]"
l_17 = "[XS:jillface,][XS:jilltalk,1][C:13]Jill:[C:C] *sigh* Man, I'm gonna miss her.[STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] After a point, I didn't even think #about getting back into a relationship #with her, but...[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] She was such an awesome person, I #just wanted to apologize.[STOPLIP:]"
l_20 = "[XS:jilltalk,1][C:13]Jill:[C:C] And now...[STOPLIP:]"
l_21 = "[XS:jillface,think][XS:jilltalk,1][C:13]Jill:[C:C] ...*sigh*[STOPLIP:]"
l_22 = "[XS:jillface,][XS:jilltalk,1][C:13]Jill:[C:C] You know... in a cruel twist of #irony, she's the one that made me pick up #bartending.[STOPLIP:]"
l_23 = "[XS:almatalk,1][C:14]Alma:[C:C] Oh?[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Back when I was thinking what the #hell to do with my life, I remembered a #night we spent in a club.[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] She started talking about how the #drinks were synthesized, the chemistry #involved, the reactions and all that.[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] Everything sounded so fascinating. I #remember saying that her talk made me #want to start mixing drinks.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] She said INI_QUOTSIf everything else fails, #why not take up bartending?INI_QUOTS[STOPLIP:]"
l_28 = "[XS:almatalk,1][C:14]Alma:[C:C] Huh... interesting.[STOPLIP:]"
l_29 = "[XS:jillface,think][XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_31 = "[XS:almatalk,1][C:14]Alma:[C:C] Are you okay?[STOPLIP:]"
l_32 = "[XS:jillface,uh][XS:jilltalk,1][C:13]Jill:[C:C] For some value of INI_QUOTSokayINI_QUOTS, yeah.[STOPLIP:]"
l_33 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's just...[STOPLIP:]"
l_34 = "[XS:jillface,smile][XS:jilltalk,1][C:13]Jill:[C:C] I wanted to thank you, Alma.[STOPLIP:]"
l_35 = "[XS:almatalk,1][C:14]Alma:[C:C] T-Thank me?[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C] I guess I just needed someone to #tell all of this to. And you were the one.[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] You volunteered yourself. You #insisted on listening to me.[STOPLIP:]"
l_38 = "[XS:jilltalk,1][C:13]Jill:[C:C] You stood there, listening to the #whole thing from beginning to end.[STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] I know I might not be the most #expressive person, that I'm not one to #spout love and fluffiness, but...[STOPLIP:]"
l_40 = "[XS:jilltalk,1][C:13]Jill:[C:C] I really like you.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe I'm just a bartender and you're #just a client...[STOPLIP:]"
l_42 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...but I really appreciate your #friendship, or at the very least your #patronage.[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] I really enjoy working for you.[STOPLIP:]"
l_44 = "[XS:almatalk,1][C:14]Alma:[C:C] ...[STOPLIP:]"
l_45 = "[XS:almatalk,1][C:14]Alma:[C:C] ...Jill, are you dying?[STOPLIP:]"
l_46 = "[XS:jillface,surprise][XS:jilltalk,1][C:13]Jill:[C:C] Shut up! I'm trying to have a heart #to heart here![STOPLIP:]"
l_47 = "[XS:almatalk,1][C:14]Alma:[C:C] Sorry, sorry. It's just...[STOPLIP:]"
l_48 = "[XS:almatalk,1][C:14]Alma:[C:C] It's weird for you to get so... #sappy.[STOPLIP:]"
l_49 = "[XS:jillface,baka][XS:jilltalk,1][C:13]Jill:[C:C] Well, I just realized that the #saddest thing is how I'll never be able to #make amends...[STOPLIP:]"
l_50 = "[XS:jillface,sad][XS:jilltalk,1][C:13]Jill:[C:C] And it hurts like fucking hell, you #know.[STOPLIP:]"
l_51 = "[XS:jilltalk,1][C:13]Jill:[C:C] I never, and I mean NEVER, wanna #feel that way ever again.[STOPLIP:]"
l_52 = "[XS:jillface,][XS:jilltalk,1][C:13]Jill:[C:C] I don't want someone to suddenly #exit my life and have my last memory of #them involve something nasty.[STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't want the lingering grief of #having burned a bridge on a whim.[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] I want to avoid that at any cost. #And if it means breaking character every #once in a while, so be it.[STOPLIP:]"
l_55 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'll let everyone know how I really #feel about them.[STOPLIP:]"
l_56 = "[XS:jillface,think][XS:jilltalk,1][C:13]Jill:[C:C] And if I ever fight with them, I'll #swallow my pride, muster all the courage I #can and be the one to apologize.[STOPLIP:]"
l_57 = "[XS:jillface,sad][XS:jilltalk,1][C:13]Jill:[C:C] I hate feeling like this. Hate it! #Hate it!![STOPLIP:]"
l_58 = "[XS:almatalk,1][C:14]Alma:[C:C] Heheh, that's a nice resolution. #Maybe I'll be a copycat and do the same.[STOPLIP:]"
l_59 = "[XS:jillface,][XS:jilltalk,1][C:13]Jill:[C:C] ...alright, enough sappiness, get #back here. I'm on duty, you know?[STOPLIP:]"
l_60 = "[XS:almatalk,1][C:14]Alma:[C:C] Fiiiiiiiiiiiiine.[XS:jillhide,1][STOPLIP:]"
l_61 = "[SHOW:185,sprite_alma][XS:almaface,smile][XS:almatalk,1][C:14]Alma:[C:C] It's almost closing time anyways.[STOPLIP:]"
l_62 = "[XS:almatalk,1][C:14]Alma:[C:C] It was fun while it lasted though.[STOPLIP:]"
l_63 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...hey.[STOPLIP:]"
l_64 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C] Yeah?[STOPLIP:]"
l_65 = "[XS:jilltalk,1][C:13]Jill:[C:C] I-I mean it, you know? Thanks for #everything today.[STOPLIP:]"
l_66 = "[XS:almaface,smile][XS:almatalk,1][C:14]Alma:[C:C] Silly Jill. You listened to my #problems and I listened to yours. That's #what friends are for, right?[STOPLIP:]"
l_67 = "[XS:jilltalk,1][C:13]Jill:[C:C] Right...[STOPLIP:]"
l_68 = "[XS:almaface,][XS:almatalk,1][C:14]Alma:[C:C] I'll be leaving now... Oh! Before I #forget.[STOPLIP:]"
l_69 = "[XS:almatalk,1][C:14]Alma:[C:C] Did you ever talk about all this #with your parents?[STOPLIP:]"
l_70 = "[XS:jilltalk,1][C:13]Jill:[C:C] They know the basics, but I haven't #told them about Lenore's death yet.[STOPLIP:]"
l_71 = "[XS:almatalk,1][C:14]Alma:[C:C] Why don't you do that sometime?[STOPLIP:]"
l_72 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't know. I don't want to bother #them with my problems...[STOPLIP:]"
l_73 = "[XS:almatalk,1][C:14]Alma:[C:C] Don't be silly, they're your #parents. They live to share your problems.[STOPLIP:]"
l_74 = "[XS:almatalk,1][C:14]Alma:[C:C] You should try having a talk like #this with them sometime. They'll #appreciate it.[STOPLIP:]"
l_75 = "[XS:almatalk,1][C:14]Alma:[C:C] Anyway, I'm out. See you on Sunday![XS:almahide,1][STOPLIP:]"
l_76 = "[XS:jilltalk,1][C:13]Jill:[C:C] Take care.[STOPLIP:]"
