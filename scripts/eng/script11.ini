l_7 = "[XS:jillface,baka][XS:jilltalk,1][C:13]Jill:[C:C] *sigh*[STOPLIP:]"
l_8 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, as the career went on and on, #it got harder and harder.[STOPLIP:]"
