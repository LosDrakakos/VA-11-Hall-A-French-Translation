l_4 = "[XS:seitalk,1][C:17]Sei:[C:C] Your legs go numb. Everything starts #sounding funnier than it really is...[STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] What's so good about not being able #to control yourself?[STOPLIP:]"
l_6 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's... a good question, actually.[STOPLIP:]"
l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] Usually people like feeling numb #because that numbness helps them forget #their problems.[STOPLIP:]"
