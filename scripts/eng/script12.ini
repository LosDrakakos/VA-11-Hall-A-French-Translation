l_9 = "[XS:seitalk,1][C:17]Sei:[C:C] So, any time I see something that #might go to waste, I can just... HEAR #Stella scolding me for it.[STOPLIP:]"
l_10 = "[XS:jilltalk,1][C:13]Jill:[C:C] Huh, you'd think it'd be the #opposite.[STOPLIP:]"
l_11 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] I can't speak for other rich people, #but Stella's family has always been #really down-to-earth.[STOPLIP:]"
l_12 = "[XS:seitalk,1][C:17]Sei:[C:C] They do indulge in expensive things #from time to time, but otherwise they're #pretty simple people.[STOPLIP:]"
l_13 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] Maybe that's the reason I've been #friends with her all this time. I doubt #I would've been able to otherwise.[STOPLIP:]"
