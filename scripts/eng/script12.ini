l_49 = "[XS:jilltalk,1][C:13]Jill:[C:C] NGH![STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] *ahem*[STOPLIP:]"
l_51 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Whoa, that was anger I read just #now. Lots of anger.[STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] I think it's weird enough already if #you call me Jill instead of INI_QUOTShoneyINI_QUOTS.[STOPLIP:]"
l_53 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Weird, huh? How you can end up #feeling associated with a name that's not #yours?[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] I have an uncle that always called #me Tina. He kept calling my cousin Tina #INI_QUOTSJill,INI_QUOTS for some reason.[STOPLIP:]"
