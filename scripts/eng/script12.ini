l_1 = "[XS:jilltalk,1][C:13]Jill:[C:C] You don't like things going to waste?[STOPLIP:]"
l_2 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] That's something that stuck with me, #thanks to Stella, actually.[STOPLIP:]"
l_3 = "[XS:seitalk,1][C:17]Sei:[C:C] She's not a cheapskate by any means, #but she's a bit obsessive about making #sure things don't go to waste.[STOPLIP:]"
l_4 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] No food goes to the trash bin. [STOPLIP:]"
l_5 = "[XS:seitalk,1][C:17]Sei:[C:C] She always gives it to her pets, or #makes fertilizer out of it if no one else #is gonna eat it.[STOPLIP:]"
l_6 = "[XS:seiface,sorry][XS:seitalk,1][C:17]Sei:[C:C] It can get annoying when you try to #peel a vegetable or fruit near her.[STOPLIP:]"
