l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hold on, so your real name in short #would be INI_QUOTSRebecca WillowINI_QUOTS?[STOPLIP:]"
l_45 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Doesn't have the same pizzaz to #it if you ask me.[STOPLIP:]"
l_46 = "[XS:jilltalk,1][C:13]Jill:[C:C] Whatever you say, Becky.[STOPLIP:]"
l_47 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Stop it![STOPLIP:]"
