l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] What are Stella's Christmas parties #like?[STOPLIP:]"
l_13 = "[XS:seiface,happy][XS:seitalk,1][C:17]Sei:[C:C] They're really big. There's lots of #food and drinks and music...[STOPLIP:]"
