l_14 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] He's also a pretty good pianist. #He plays in a jazz band on the weekends.[STOPLIP:]"
l_15 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] There's also Nadeera, a drag #queen and the owner of a club I've been #invited to a few times.[STOPLIP:]"
l_16 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] She has an animal shelter on the #side. I help her with it occasionally.[STOPLIP:]"
l_17 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Oh, there's also sister #Clementine, a nun from an orphanage.[STOPLIP:]"
l_18 = "[XS:doroface,pachi][XS:dorotalk,1][C:18]Dorothy:[C:C] I go there sometimes and play #with the kids.[STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] Whoa, that's something I didn't #expect to hear.[STOPLIP:]"
l_20 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] ...I also almost got adopted once.[STOPLIP:]"
l_21 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] I was flattered, but it was... #weird.[STOPLIP:]"
l_22 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] Oh, and it turns out I already #knew your boss.[STOPLIP:]"
l_23 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Some years ago she...[STOPLIP:]"
l_24 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] ...[STOPLIP:]"
l_25 = "[XS:jilltalk,1][C:13]Jill:[C:C] She what? What?![STOPLIP:]"
l_26 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] ...I said too much. Client #confidentiality and all that.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_28 = "[XS:jilltalk,1][C:13]Jill:[C:C] *ahem*[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well, enough tangents. Why were you #gloomy in the first place?[STOPLIP:]"
l_30 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Gloomy?[STOPLIP:]"
