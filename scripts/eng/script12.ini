l_39 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Only my mom... err... guardian #calls me Rebecca, so it's weird to hear it #from others.[STOPLIP:]"
l_40 = "[XS:jilltalk,1][C:13]Jill:[C:C] What about Willow?[STOPLIP:]"
l_41 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Willow's my first surname, #actually. [STOPLIP:]"
l_42 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] When I got registered, my #guardian was married to a guy who had #INI_QUOTSWillowINI_QUOTS as a last name.[STOPLIP:]"
