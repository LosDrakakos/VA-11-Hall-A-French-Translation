l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] Despair and pain cloud your #judgement and make you do stupid things #sometimes...[STOPLIP:]"
l_12 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] ...[STOPLIP:]"
l_13 = "[XS:seitalk,1][C:17]Sei:[C:C] Yeah... I've seen that firsthand.[STOPLIP:]"
