[28]
l_1 = "[XS:doroface,heart][XS:dorotalk,1][C:18]Dorothy:[C:C] I still can't believe you #actually remembered what I said about the #Piano Woman.[STOPLIP:]"
l_2 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's always good to keep note of #what regulars like, you know?[STOPLIP:]"
l_3 = "[XS:jilltalk,1][C:13]Jill:[C:C] I've wondered for a while though. #Why do you keep coming back here?[STOPLIP:]"
l_4 = "[XS:doroface,pachi][XS:dorotalk,1][C:18]Dorothy:[C:C] For you, of course.[STOPLIP:]"
l_5 = "[XS:jilltalk,1][C:13]Jill:[C:C] Come again?[STOPLIP:]"
l_6 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Why else would I come, if not to #see you?[STOPLIP:]"
l_7 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] You're one of the few people #willing to hear me out, always filled with #curiosity.[STOPLIP:]"
l_8 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] And you're cute. Talking to cute #people is always nice.[STOPLIP:]"
l_9 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] There's also the bar, the way #it's insulated from the noise of the city. #It's really comfortable.[STOPLIP:]"
l_10 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] And it's just a bit away from the #street I'm always at. A win-win situation![STOPLIP:]"
l_11 = "[XS:jilltalk,1][C:13]Jill:[C:C] I see.[STOPLIP:]"
l_12 = "[XS:jilltalk,1][C:13]Jill:[C:C] It was weird to see you down though. #Especially since you're always so lively.[STOPLIP:]"
l_13 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] Well, I wasn't down, really. I #was just thinking about a lot of things.[STOPLIP:]"
l_14 = "[XS:jilltalk,1][C:13]Jill:[C:C] Like what?[STOPLIP:]"
l_15 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] Well, my mom, er... guardian #asked me to go home on Monday for a bit.[STOPLIP:]"
l_16 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] And as much as I love her, being #with her is usually... tiring.[STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] INI_QUOTSGuardianINI_QUOTS... [STOPLIP:]"
l_18 = "[XS:jilltalk,1][C:13]Jill:[C:C] That whole thing about someone #taking care of a Lilim after they're #deployed until they reach maturity, right?[STOPLIP:]"
l_19 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] Yup. And I'm proud to say that I #reached psychological maturity in just one #year![STOPLIP:]"
l_20 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] They always try and keep a varied #pool of volunteers to make the Collective #Source grow faster.[STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, what's wrong with your guardian?[STOPLIP:]"
l_22 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] Well, she still treats me like a #kid.[STOPLIP:]"
l_23 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] The worst part is that sometimes #I fear she might see me as some sort of #replacement for her dead daughter.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Huh? Dead daughter?[STOPLIP:]"
l_25 = "[XS:doroface,sad][XS:dorotalk,1][C:18]Dorothy:[C:C] I was deployed to her not long #after she lost her daughter. A contrived #coincidence, really.[STOPLIP:]"
l_26 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] Even when I was still developing #Self-Awareness, I always feared she might #be using me as a replacement.[STOPLIP:]"
l_27 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] She didn't though, or at least #not consciously. [STOPLIP:]"
l_28 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] At times she would just stop #doing something, or return a gift she's #given me...[STOPLIP:]"
l_29 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] If she felt like she was projecting #too much of her daughter onto me.[STOPLIP:]"
l_30 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] What irony that years later, I'd #make a living pretending to be someone #else in the bedroom.[STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] How's that?[STOPLIP:]"
l_32 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Well, most of the time, my job #involves role-playing. A daughter, a #student, some helpless kid...[STOPLIP:]"
l_33 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] It means I've gotten many clients #looking exactly for that, but on the other #hand...[STOPLIP:]"
l_34 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] From a professional standpoint, #I'd rather have them hire me because of #me.[STOPLIP:]"
l_35 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Because of my character, not #because I'm INI_QUOTSThe one that roleplays as #little girlsINI_QUOTS.[STOPLIP:]"
l_36 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] Maybe I need to exaggerate some #attribute...[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] What's the problem with your #guardian then? If you do that on a daily #basis, why worry about it?[STOPLIP:]"
l_38 = "[XS:doroface,sad][XS:dorotalk,1][C:18]Dorothy:[C:C] Because I don't wanna make her #sad.[STOPLIP:]"
l_39 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Every time I visit her, I fear #she might look at me and see her daughter. #That seeing me makes her sad.[STOPLIP:]"
l_40 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] At this point, I don't even care #if she's projecting her daughter onto me, #I just don't wanna make her feel sad.[STOPLIP:]"
l_41 = "[XS:jilltalk,1][C:13]Jill:[C:C] Did you try talking with her?[STOPLIP:]"
l_42 = "[XS:doroface,think][XS:dorotalk,1][C:18]Dorothy:[C:C] How so?[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] Telling her just what you said to #me. Clear up those fears.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, unless she's not the kind to #want anyone opening up to her, that is.[STOPLIP:]"
l_45 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] I... never really thought about #talking to her about that.[STOPLIP:]"
l_46 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] It doesn't sound like something #you just bring up though.[STOPLIP:]"
l_47 = "[XS:jilltalk,1][C:13]Jill:[C:C] Keep it in mind, at least. Maybe #she'll appreciate the gesture.[STOPLIP:]"
l_48 = "[XS:jilltalk,1][C:13]Jill:[C:C] I wouldn't know though. I haven't #met her.[STOPLIP:]"
l_49 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] She's a really nice woman. The #problem is mostly with me, I think.[XS:ph,9][E:29][STOPLIP:]"
