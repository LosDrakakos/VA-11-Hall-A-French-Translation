l_35 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] People have always called me #Dorothy rather than Rebecca for some #reason. That's why I chose it.[STOPLIP:]"
l_36 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] It's useful too. People have #tried to falsify stuff using my name and #they always get caught.[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] Because they use INI_QUOTSDorothy HazeINI_QUOTS as #their name?[STOPLIP:]"
