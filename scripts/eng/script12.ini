l_47 = "[XS:jilltalk,1][C:13]Jill:[C:C] Although I guess comparisons are #useless here. They rarely help with #complexes.[STOPLIP:]"
l_48 = "[XS:seitalk,1][C:17]Sei:[C:C] Well, she does go the extra mile to #hide it.[STOPLIP:]"
l_49 = "[XS:seitalk,1][C:17]Sei:[C:C] In fact, I have no idea how she does #it.[STOPLIP:]"
l_50 = "[XS:seitalk,1][C:17]Sei:[C:C] I mean, I've seen her before and after #she tucks them away, but... I guess I never #cared enough to ask the specifics.[STOPLIP:]"
l_51 = "[XS:seitalk,1][C:17]Sei:[C:C] That's also why when she goes out, she #styles her hair in those... um...[STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] Drills?[STOPLIP:]"
l_53 = "[XS:seitalk,1][C:17]Sei:[C:C] They look a bit drill-y, don't they?[STOPLIP:]"
