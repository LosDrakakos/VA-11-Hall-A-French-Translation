l_40 = "[XS:jilltalk,1][C:13]Jill:[C:C] That's... hard to imagine.[STOPLIP:]"
l_41 = "[XS:seitalk,1][C:17]Sei:[C:C] Oh, but she does have one. She #distresses a lot about her bust size.[STOPLIP:]"
l_42 = "[XS:jilltalk,1][C:13]Jill:[C:C] Really? She's not that small. I think #I'm smaller than her, in fact.[STOPLIP:]"
l_43 = "[XS:seitalk,1][C:17]Sei:[C:C] Actually, it's the opposite. The #opposite kind of complex, I mean.[STOPLIP:]"
l_44 = "[XS:seitalk,1][C:17]Sei:[C:C] She's a bit self-conscious about having #a big chest.[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] Really?[STOPLIP:]"
