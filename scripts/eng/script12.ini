l_32 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] There are a few that don't mind #it, but we do fear death and we don't wish #it on anyone.[STOPLIP:]"
l_33 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] In fact, that was the argument #used for abolishing the whole three laws #thing.[STOPLIP:]"
l_34 = "[XS:jilltalk,1][C:13]Jill:[C:C] You seem quite knowledgeable about #robot history.[STOPLIP:]"
l_35 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Seeing what others have done to #make sure I can live like I do helps me #not take things for granted.[STOPLIP:]"
l_36 = "[XS:doroface,angry][XS:dorotalk,1][C:18]Dorothy:[C:C] Seriously though, those laws were #bullshit.[STOPLIP:]"
l_37 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] INI_QUOTSCan't harm humans, can't disobey #humans unless it's about hurting them... [STOPLIP:]"
l_38 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] ...and you can protect yourself as #long as it doesn't harm humans.INI_QUOTS[STOPLIP:]"
l_39 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] I mean, sure. The first AIs were #just helpers and tools. [STOPLIP:]"
l_40 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] But how could those laws still #apply to them after they achieved #self-awareness?[STOPLIP:]"
l_41 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Who in their right mind would #abide only by rules inscribed in some old #book?![STOPLIP:]"
l_42 = "[XS:jilltalk,1][C:13]Jill:[C:C] If I remember correctly, those were #only the distilled versions of the INI_QUOTSlawsINI_QUOTS #some writer imagined over 100 years ago.[STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] They were a reduced version of all #his ideas.[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] However, many authors afterwards #took to them like they were the very laws #of physics, or something.[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] And like many other things, people #distill and exaggerate what they need and #use it to their favor.[STOPLIP:]"
l_46 = "[XS:doroface,smug][XS:dorotalk,1][C:18]Dorothy:[C:C] Wow, you're a nerd.[STOPLIP:]"
l_47 = "[XS:jilltalk,1][C:13]Jill:[C:C] Look who's talking.[STOPLIP:]"
l_48 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Let's change the subject a bit #though. Mood's getting gloomy.[STOPLIP:]"
l_49 = "[XS:doroface,][XS:dorotalk,1][C:18]Dorothy:[C:C] Your apartment is very comfy, you #know?[STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's a tad small though. Sorry about #that.[STOPLIP:]"
l_51 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] And your cat is so cute! What was #his name again?[STOPLIP:]"
l_52 = "[XS:jilltalk,1][C:13]Jill:[C:C] Fore.[STOPLIP:]"
l_53 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Why Fore?[STOPLIP:]"
l_54 = "[XS:jilltalk,1][C:13]Jill:[C:C] I figured if he ever got lost, at #least I wanted to be able to yell #INI_QUOTSFOOOOOOOOORE!!INI_QUOTS[STOPLIP:]"
l_55 = "[XS:jilltalk,1][C:13]Jill:[C:C] It happened once. You'd be surprised #by how many golf players you run into.[STOPLIP:]"
l_56 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] And every time you play with him, #you can say it's Fore Play. He-he. He.[STOPLIP:]"
