l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] Heh...[STOPLIP:]"
l_22 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] Stella always does her best to put up #a tough girl facade, but she's very much #in touch with her inner child.[STOPLIP:]"
l_23 = "[XS:seitalk,1][C:17]Sei:[C:C] Christmas, Easter, Halloween. Name a #party and she most likely celebrates it #big.[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] Interesting.[STOPLIP:]"
l_25 = "[XS:seitalk,1][C:17]Sei:[C:C] Do you like parties, Jill?[STOPLIP:]"
l_26 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't mind them. They're a good #place to see people.[STOPLIP:]"
l_27 = "[XS:jilltalk,1][C:13]Jill:[C:C] I'm not one to actively look for #parties to attend, though. I just... don't #mind going to them.[STOPLIP:]"
l_28 = "[XS:seitalk,1][C:17]Sei:[C:C] Ah, I see.[STOPLIP:]"
l_29 = "[XS:seitalk,1][C:17]Sei:[C:C] I only go to parties that Stella is #attending. Because otherwise, I'd just #stand there without anything to say.[STOPLIP:]"
l_30 = "[XS:seitalk,1][C:17]Sei:[C:C] That and... I'm not one to wear #dresses, you know?[STOPLIP:]"
l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] You're not?[STOPLIP:]"
l_32 = "[XS:seitalk,1][C:17]Sei:[C:C] I'm a tad too ripped. They don't look #cute on me.[STOPLIP:]"
l_33 = "[XS:seitalk,1][C:17]Sei:[C:C] Although, with all this healing I #have to do, I won't be as fit for a while.[STOPLIP:]"
l_34 = "[XS:seiface,sad][XS:seitalk,1][C:17]Sei:[C:C] They're too... um... breezy too. I #feel like I'm wearing nothing.[STOPLIP:]"
l_35 = "[XS:seiface,][XS:seitalk,1][C:17]Sei:[C:C] But I bet you'd look good in a dress, #Jill.[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's been years since I last wore #one. I wouldn't know.[STOPLIP:]"
l_37 = "[XS:jilltalk,1][C:13]Jill:[C:C] Last time I wore one, I remember #worrying my arms were too thin or #something like that.[STOPLIP:]"
l_38 = "[XS:seitalk,1][C:17]Sei:[C:C] We all have a complex, huh?[STOPLIP:]"
