l_31 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, what's your legal name, then?[STOPLIP:]"
l_32 = "[XS:dorotalk,1][C:18]Dorothy:[C:C] Rebecca Dorothy Willow Graem. A #bit of a mouthful, if you ask me.[STOPLIP:]"
l_33 = "[XS:jilltalk,1][C:13]Jill:[C:C] So Dorothy's actually your second #name?[STOPLIP:]"
