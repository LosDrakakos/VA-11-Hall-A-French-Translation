l_11 = "[SHOW:280,sprite_stella][XS:stelface,][SHOW:120,sprite_art][XS:steltalk,1][C:16]Stella:[C:C] While I won't deny Zaibatsu Corp is #anything but innocent... [STOPLIP:]"
