l_21 = "[XS:steltalk,1][C:16]Stella:[C:C] The AI Integration Program they #started is making huge advances in the AI #department.[STOPLIP:]"
l_22 = "[XS:steltalk,1][C:16]Stella:[C:C] Every day, more and more countries #are seeing the benefits of recognizing AIs #as citizens.[STOPLIP:]"
l_23 = "[XS:arttalk,1][C:26]Art:[C:C] Yes, but we also hold the AI Reformation #Program.[STOPLIP:]"
l_24 = "[XS:arttalk,1][C:26]Art:[C:C] Meaning that we're also the world's #Lilim prison.[STOPLIP:]"
l_25 = "[XS:arttalk,1][C:26]Art:[C:C] AI went rogue? Transfer it to a delivery #drone or ship it to Glitch City.[STOPLIP:]"
l_26 = "[XS:arttalk,1][C:26]Art:[C:C] That murderer is now delivering your #pizza.[STOPLIP:]"
l_27 = "[XS:steltalk,1][C:16]Stella:[C:C] Fair point. Although that program HAS #proven to have reformed many AIs.[STOPLIP:]"
l_28 = "[XS:steltalk,1][C:16]Stella:[C:C] They don't brag about their 88% #success rate for nothing.[STOPLIP:]"
l_29 = "[XS:jilltalk,1][C:13]Jill:[C:C] Um...[STOPLIP:]"
l_30 = "[XS:steltalk,1][C:16]Stella:[C:C] The city also has a stronger economy.[STOPLIP:]"
l_31 = "[XS:steltalk,1][C:16]Stella:[C:C] Zaibatsu Corp's success has made more #and more companies bring their products #here.[STOPLIP:]"
