l_17 = "[XS:arttalk,1][C:26]Art:[C:C] But then again, I don't expect a kid to #understand how hard it was, let alone a rich #kid.[STOPLIP:]"
l_18 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] True, I don't know. And true, I have #a privilege that clouds my judgement.[STOPLIP:]"
l_19 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] But can you deny that the meddling of #Zaibatsu Corp has brought quite a few #benefits?[STOPLIP:]"
