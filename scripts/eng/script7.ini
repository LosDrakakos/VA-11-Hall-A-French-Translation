l_10 = "[XS:steltalk,1][C:16]Stella:[C:C] They use a INI_QUOTSbusiness maskINI_QUOTS to hide #anything they don't want others to know and #I do the same.[STOPLIP:]"
l_11 = "[XS:steltalk,1][C:16]Stella:[C:C] But with Sei I can be myself, I can #do whatever I want and vent all my #frustrations.[STOPLIP:]"
l_12 = "[XS:stelface,concern][XS:steltalk,1][C:16]Stella:[C:C] She's always been there for me, and #now she might need me...[STOPLIP:]"
l_13 = "[XS:stelface,sad][XS:steltalk,1][C:16]Stella:[C:C] But here I am, sitting in a bar, #making other people do that job because #I'm a useless pile of flesh![STOPLIP:]"
