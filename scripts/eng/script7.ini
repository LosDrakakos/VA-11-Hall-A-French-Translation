l_6 = "[XS:stelface,][XS:steltalk,1][C:16]Stella:[C:C] *ahem* Don't worry about it.[STOPLIP:]"
l_7 = "[XS:steltalk,1][C:16]Stella:[C:C] As I was saying, she's more than a #friend. She's my emotional support, she's #someone I can trust wholeheartedly.[STOPLIP:]"
