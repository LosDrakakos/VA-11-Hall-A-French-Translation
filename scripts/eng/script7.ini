l_33 = "[XS:arttalk,1][C:26]Art:[C:C] More companies just mean more people #who will plant their feet on your face.[STOPLIP:]"
l_34 = "[XS:steltalk,1][C:16]Stella:[C:C] But it also means more products are #being brought to the lower classes.[STOPLIP:]"
