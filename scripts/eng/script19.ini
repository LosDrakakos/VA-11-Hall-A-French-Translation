l_29 = "[SILENCE:][SHOW:185,sprite_gaby][XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Um... hello.[XS:gabytalk,0][STOPLIP:]"
l_30 = "[XS:jilltalk,1][C:13]Jill:[C:C] Gaby...[STOPLIP:]"
l_31 = "[SHOW:0,wdigfh_play][XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_32 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...c-come in.[STOPLIP:]"
l_33 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Excuse me...[XS:gabytalk,0][STOPLIP:]"
l_34 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_35 = "[XS:jilltalk,1][C:13]Jill:[C:C] Welcome to Valha-...[STOPLIP:]"
l_36 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_37 = "Jill & Gaby:[XS:gabytalk,1] Hey![XS:gabytalk,0][STOPLIP:]"
l_38 = "Jill & Gaby:[XS:gabytalk,1] ...[XS:gabytalk,0][STOPLIP:]"
l_39 = "[XS:jilltalk,1][C:13]Jill:[C:C] Y-You talk first.[STOPLIP:]"
l_40 = "[XS:gabytalk,1][C:43]Gaby:[C:C] No, I...[XS:gabytalk,0][STOPLIP:]"
l_41 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Well...[XS:gabytalk,0][STOPLIP:]"
l_42 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_43 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_44 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...some days ago, I got a letter.[STOPLIP:]"
l_45 = "[XS:jilltalk,1][C:13]Jill:[C:C] And even odder than getting a letter, #is the fact that...[STOPLIP:]"
l_46 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...it was from your sister.[STOPLIP:]"
l_47 = "[XS:gabyface,surprise][XS:gabytalk,1][C:43]Gaby:[C:C] A what?[XS:gabytalk,0][STOPLIP:]"
l_48 = "[XS:gabytalk,1][C:43]Gaby:[C:C] My sister sent you a letter? That's #the first I've heard of it.[XS:gabytalk,0][STOPLIP:]"
l_49 = "[XS:gabytalk,1][C:43]Gaby:[C:C] What did it say?[XS:gabytalk,0][STOPLIP:]"
l_50 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't know, I never opened it.[STOPLIP:]"
l_51 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...at least not until now.[STOPLIP:]"
l_52 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Huh?[XS:gabytalk,0][STOPLIP:]"
l_53 = "[XS:jilltalk,1][C:13]Jill:[C:C] I figured I should read it with you.[STOPLIP:]"
l_54 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_55 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Yeah, let's do it.[XS:gabytalk,0][STOPLIP:]"
l_56 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Let's read it.[XS:gabytalk,0][STOPLIP:]"
l_57 = "[XS:jilltalk,1][C:13]Jill:[C:C] Alright then...[STOPLIP:]"
l_58 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_59 = "[SOUND:pageturn][C:13]...[C:C][STOPLIP:]"
l_60 = "[C:13]Sorry.[C:C][STOPLIP:]"
l_61 = "[C:13]...[C:C][STOPLIP:]"
l_62 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_63 = "[XS:gabyface,surprise][XS:gabytalk,1][C:43]Gaby:[C:C] Just... Just that?[XS:gabytalk,0][STOPLIP:]"
l_64 = "[XS:jilltalk,1][C:13]Jill:[C:C] Yup.[STOPLIP:]"
l_65 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Isn't there anything else in the #letter? Maybe on the back?[XS:gabytalk,0][STOPLIP:]"
l_66 = "[XS:jilltalk,1][C:13]Jill:[C:C] *sigh* This is just like your sister.[STOPLIP:]"
l_67 = "[XS:jilltalk,1][C:13]Jill:[C:C] I spent days worried about this letter, #not wanting to open it for fear of what it #might contain.[STOPLIP:]"
l_68 = "[XS:jilltalk,1][C:13]Jill:[C:C] I lost sleep and appetite thinking #about it.[STOPLIP:]"
l_69 = "[XS:jilltalk,1][C:13]Jill:[C:C] And after all those worries, after all #those problems... [STOPLIP:]"
l_70 = "[XS:jilltalk,1][C:13]Jill:[C:C] After all these years not talking to #her, she sends me a letter, a fucking #letter of all things.[STOPLIP:]"
l_71 = "[XS:jilltalk,1][C:13]Jill:[C:C] And she just says INI_QUOTSSorryINI_QUOTS?![STOPLIP:]"
l_72 = "[XS:jilltalk,1][C:13]Jill:[C:C] Sorry for what?! For our fight? For #not talking all these years?[STOPLIP:]"
l_73 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_74 = "[XS:jilltalk,1][C:13]Jill:[C:C] Agh! Now I'm fucking pissed.[STOPLIP:]"
l_75 = "[XS:gabyface,smile][XS:gabytalk,1][C:43]Gaby:[C:C] Heheh...[XS:gabytalk,0][STOPLIP:]"
l_76 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...are you laughing?[STOPLIP:]"
l_77 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Heheheheh... Sorry, I just... heheh... #I remembered all the times my sis provoked #you that way.[XS:gabytalk,0][STOPLIP:]"
l_78 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Like that time where she gave you #chocolates labeled 1, 2 and 4 during #Valentine's Day.[XS:gabytalk,0][STOPLIP:]"
l_79 = "[XS:gabytalk,1][C:43]Gaby:[C:C] And you were pissed about the lack of #a 3.[XS:gabytalk,0][STOPLIP:]"
l_80 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Or that time when you left an unopened #Beer bottle on the table, she sneakily #opened it and took a sip.[XS:gabytalk,0][STOPLIP:]"
l_81 = "[XS:gabytalk,1][C:43]Gaby:[C:C] She didn't tell you she did it and you #were confused all day long.[XS:gabytalk,0][STOPLIP:]"
l_82 = "[XS:jilltalk,1][C:13]Jill:[C:C] She always bragged she knew me like the #back of her hand.[STOPLIP:]"
l_83 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...if the letter was supposed to piss #me off like that, I guess she had all the #rights to brag.[STOPLIP:]"
l_84 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Maybe she was being sincere, though.[XS:gabytalk,0][STOPLIP:]"
l_85 = "[XS:gabytalk,1][C:43]Gaby:[C:C] She did express to me that she was #sorry on more than one occasion.[XS:gabytalk,0][STOPLIP:]"
l_86 = "[XS:jilltalk,1][C:13]Jill:[C:C] She did, huh?[STOPLIP:]"
l_87 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_88 = "[XS:jilltalk,1][C:13]Jill:[C:C] You told me she died from... Localized #Nanomachine Rejection, right?[STOPLIP:]"
l_89 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] In her heart, yeah.[XS:gabytalk,0][STOPLIP:]"
l_90 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Instead of the massive rejection that #always makes the news, her case was more... #focused. [XS:gabytalk,0][STOPLIP:]"
l_91 = "[XS:gabytalk,1][C:43]Gaby:[C:C] They usually amputate or replace the #part and call it a day.[XS:gabytalk,0][STOPLIP:]"
l_92 = "[XS:gabytalk,1][C:43]Gaby:[C:C] But organs are different. The condition #made her susceptible to transplant #rejections.[XS:gabytalk,0][STOPLIP:]"
l_93 = "[XS:jilltalk,1][C:13]Jill:[C:C] Not to mention artificial hearts and #genetic treatments were out of the question.[STOPLIP:]"
l_94 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Yup.[XS:gabytalk,0][STOPLIP:]"
l_95 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Thing is, apparently, she suffered that #since she was 18, but kept it a secret from #everyone.[XS:gabytalk,0][STOPLIP:]"
l_96 = "[XS:jilltalk,1][C:13]Jill:[C:C] Why?[STOPLIP:]"
l_97 = "[XS:gabyface,angry][XS:gabytalk,1][C:43]Gaby:[C:C] Hell if I know. I was angry to learn #that she hid it.[XS:gabytalk,0][STOPLIP:]"
l_98 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Why didn't she tell me?! Was it to #avoid worrying me? Was she ashamed? What #was it?![XS:gabytalk,0][STOPLIP:]"
l_99 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_100 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_101 = "[XS:jilltalk,1][C:13]Jill:[C:C] Wait, how did she live so normally #then?[STOPLIP:]"
l_102 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] She had to use a serum. Shots near her #heart every three days.[XS:gabytalk,0][STOPLIP:]"
l_103 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Apparently, the serum burns like hell. #The shot even left her a nasty mark where #she had to apply them.[XS:gabytalk,0][STOPLIP:]"
l_104 = "[XS:jilltalk,1][C:13]Jill:[C:C] (So the thing near her left breast #wasn't a birth mark?)[STOPLIP:]"
l_105 = "[XS:jilltalk,1][C:13]Jill:[C:C] And the rejection was what ended up #killing her?[STOPLIP:]"
l_106 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] The Nanomachine Rejection was what #ended up killing her, but they couldn't #find what made her so vulnerable.[XS:gabytalk,0][STOPLIP:]"
l_107 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Doctor said she might have missed a #shot, or the shots made her other defenses #grow weaker.[XS:gabytalk,0][STOPLIP:]"
l_108 = "[XS:gabytalk,1][C:43]Gaby:[C:C] The condition could've just gone nuts #outta nowhere, or maybe it was blood #pressure.[XS:gabytalk,0][STOPLIP:]"
l_109 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Maybe it was a regular heart attack #and the rejection acted afterwards, they #don't know.[XS:gabytalk,0][STOPLIP:]"
l_110 = "[XS:gabyface,angry][XS:gabytalk,1][C:43]Gaby:[C:C] She kept it a secret from everyone, #so nobody knows![XS:gabytalk,0][STOPLIP:]"
l_111 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Maybe if she had told me about it, I #could've helped her, maybe she'd still be #alive.[XS:gabytalk,0][STOPLIP:]"
l_112 = "[XS:gabyface,sad][XS:gabytalk,1][C:43]Gaby:[C:C] Maybe she wouldn't have faced it alone #instead of just dying in her sleep.[XS:gabytalk,0][STOPLIP:]"
l_113 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_114 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_115 = "[XS:jilltalk,1][C:13]Jill:[C:C] Thinking about what ifs won't bring #her back.[STOPLIP:]"
l_116 = "[XS:gabyface,surprise][XS:gabytalk,1][C:43]Gaby:[C:C] Eh?[XS:gabytalk,0][STOPLIP:]"
l_117 = "[XS:jilltalk,1][C:13]Jill:[C:C] I spent so much time hammering myself #with what ifs after you told me she died.[STOPLIP:]"
l_118 = "[XS:jilltalk,1][C:13]Jill:[C:C] What if I waited to cool down a bit #back then? What if I just swallowed my fears #at that very moment?[STOPLIP:]"
l_119 = "[XS:jilltalk,1][C:13]Jill:[C:C] What if I had apologized earlier? #What if I had given a chance to the #research institute thing back then?[STOPLIP:]"
l_120 = "[XS:jilltalk,1][C:13]Jill:[C:C] And the amount just increased #threefold after I lashed out at you the #other day. [STOPLIP:]"
l_121 = "[XS:jilltalk,1][C:13]Jill:[C:C] But today, I realized something.[STOPLIP:]"
l_122 = "[XS:jilltalk,1][C:13]Jill:[C:C] Having such regrets with the dead is a #hollow effort.[STOPLIP:]"
l_123 = "[XS:jilltalk,1][C:13]Jill:[C:C] You're alive, you're here. I can make #amends with you... but I can't make amends #with the dead.[STOPLIP:]"
l_124 = "[XS:jilltalk,1][C:13]Jill:[C:C] I can't apologize to her like I can #apologize to you right now.[STOPLIP:]"
l_125 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Jill...[XS:gabytalk,0][STOPLIP:]"
l_126 = "[XS:jilltalk,1][C:13]Jill:[C:C] Lenore, she's...[STOPLIP:]"
l_127 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_128 = "[XS:jilltalk,1][C:13]Jill:[C:C] She's resting now.[STOPLIP:]"
l_129 = "[XS:jilltalk,1][C:13]Jill:[C:C] She's just resting after having that #heart condition all these years.[STOPLIP:]"
l_130 = "[XS:gabyface,sad][XS:gabytalk,1][C:43]Gaby:[C:C] She didn't have to face it alone, #though. If she only...[XS:gabytalk,0][STOPLIP:]"
l_131 = "[XS:jilltalk,1][C:13]Jill:[C:C] So! Let's celebrate her life and #achievements.[STOPLIP:]"
l_132 = "[XS:jilltalk,1][C:13]Jill:[C:C] If we are to mourn, let's mourn her #together. If we are to honor her, we'll do #it together.[STOPLIP:]"
l_133 = "[XS:gabyface,surprise][XS:gabytalk,1][C:43]Gaby:[C:C] Together...[XS:gabytalk,0][STOPLIP:]"
l_134 = "[XS:jilltalk,1][C:13]Jill:[C:C] Lenore was a fun-loving person. The #best we can do right now is try to lighten #up, even if it's only for a moment.[STOPLIP:]"
l_135 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_136 = "[XS:jilltalk,1][C:13]Jill:[C:C] I need to ask, though. Did she really #start to complain about chest pains shortly #after I left?[STOPLIP:]"
l_137 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] N-No...[XS:gabytalk,0][STOPLIP:]"
l_138 = "[XS:gabytalk,1][C:43]Gaby:[C:C] She didn't get visibly worse after you #left or anything. Everything was actually #too sudden.[XS:gabytalk,0][STOPLIP:]"
l_139 = "[XS:gabytalk,1][C:43]Gaby:[C:C] She did complain about chest pains from #time to time, but that actually goes way #back before you left.[XS:gabytalk,0][STOPLIP:]"
l_140 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Back then, we thought it was just acid #reflux or something.[XS:gabytalk,0][STOPLIP:]"
l_141 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_142 = "[XS:gabyface,shyclosed][XS:gabytalk,1][C:43]Gaby:[C:C] Gods, I even blamed her death on you.[XS:gabytalk,0][STOPLIP:]"
l_143 = "[XS:gabytalk,1][C:43]Gaby:[C:C] I was just too angry back then, and #part of me just wanted to put the blame #on... someone or something.[XS:gabytalk,0][STOPLIP:]"
l_144 = "[XS:gabytalk,1][C:43]Gaby:[C:C] And you didn't deserve that. Sorry.[XS:gabytalk,0][STOPLIP:]"
l_145 = "[XS:jilltalk,1][C:13]Jill:[C:C] Hey, I'm sorry too, you know?[STOPLIP:]"
l_146 = "[XS:jilltalk,1][C:13]Jill:[C:C] We both have things to apologize for. #Don't think too much about it.[STOPLIP:]"
l_147 = "[XS:jilltalk,1][C:13]Jill:[C:C] I should've been mature and not shouted #at you either. So.[STOPLIP:]"
l_148 = "[XS:jilltalk,1][C:13]Jill:[C:C] Let's just call all that water under #the bridge, shall we?[STOPLIP:]"
l_149 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Are you sure?[XS:gabytalk,0][STOPLIP:]"
l_150 = "[XS:jilltalk,1][C:13]Jill:[C:C] Of course I am.[STOPLIP:]"
l_151 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_152 = "[XS:jilltalk,1][C:13]Jill:[C:C] So, how did you find me, exactly?[STOPLIP:]"
l_153 = "[XS:gabytalk,1][C:43]Gaby:[C:C] E-Eh? Um... [XS:gabytalk,0][STOPLIP:]"
l_154 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] Well... have you heard of a message #board called Danger/u/?[XS:gabytalk,0][STOPLIP:]"
l_155 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...I have, yeah.[STOPLIP:]"
l_156 = "[XS:gabytalk,1][C:43]Gaby:[C:C] Well, truth is that I visit it from #time to time.[XS:gabytalk,0][STOPLIP:]"
l_157 = "[XS:gabytalk,1][C:43]Gaby:[C:C] And the other day, I read a thread that #discussed the bar.[XS:gabytalk,0][STOPLIP:]"
l_158 = "[XS:gabytalk,1][C:43]Gaby:[C:C] And the description of the bartender #sounded just like you.[XS:gabytalk,0][STOPLIP:]"
l_159 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_160 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] Are you mad?[XS:gabytalk,0][STOPLIP:]"
l_161 = "[XS:jilltalk,1][C:13]Jill:[C:C] No, not mad. More like... dumbfounded.[STOPLIP:]"
l_162 = "[XS:gabytalk,1][C:43]Gaby:[C:C] ...[XS:gabytalk,0][STOPLIP:]"
l_163 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] Hey Jill, can you tell me what the #problem was back then?[XS:gabytalk,0][STOPLIP:]"
l_164 = "[XS:gabytalk,1][C:43]Gaby:[C:C] What sparked that fight? Weren't you #happy with my sister?[XS:gabytalk,0][STOPLIP:]"
l_165 = "[XS:jilltalk,1][C:13]Jill:[C:C] Well... hm...[STOPLIP:]"
l_166 = "[XS:jilltalk,1][C:13]Jill:[C:C] Back then, I didn't know what to do #with myself after I graduated college.[STOPLIP:]"
l_167 = "[XS:jilltalk,1][C:13]Jill:[C:C] I went in and pretty much hated my #last couple of years there.[STOPLIP:]"
l_168 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's not far-fetched to think that I #only tolerated being there because your #sister was with me.[STOPLIP:]"
l_169 = "[XS:jilltalk,1][C:13]Jill:[C:C] Had she stopped supporting my studies, #I would've quit right then and there.[STOPLIP:]"
l_170 = "[XS:jilltalk,1][C:13]Jill:[C:C] And then after graduating, I got a #very good job offer... that she accepted #on my behalf in no time.[STOPLIP:]"
l_171 = "[XS:jilltalk,1][C:13]Jill:[C:C] She kept saying it was the best for me #and my future, but I was LIVID. Why did she #have to do that?[STOPLIP:]"
l_172 = "[XS:jilltalk,1][C:13]Jill:[C:C] I hated it... I didn't even know if I #wanted to go there, but she still insisted #so much. [STOPLIP:]"
l_173 = "[XS:jilltalk,1][C:13]Jill:[C:C] Like she was forcing that burden on #me.[STOPLIP:]"
l_174 = "[XS:jilltalk,1][C:13]Jill:[C:C] And then INI_QUOTSmyINI_QUOTS became INI_QUOTSourINI_QUOTS future and #she started talking about marriage...[STOPLIP:]"
l_175 = "[XS:gabyface,surprise][XS:gabytalk,1][C:43]Gaby:[C:C] YOU WERE GOING TO GET MARRIED?![XS:gabytalk,0][STOPLIP:]"
l_176 = "[XS:jilltalk,1][C:13]Jill:[C:C] I don't think we ever took it #seriously! It was just something she #kept mentioning.[STOPLIP:]"
l_177 = "[XS:jilltalk,1][C:13]Jill:[C:C] Not like we didn't think about that #down the line, but she mostly teased me #with it.[STOPLIP:]"
l_178 = "[XS:gabyface,][XS:jilltalk,1][C:13]Jill:[C:C] But the thought suddenly scared the #shit out of me...[STOPLIP:]"
l_179 = "[XS:jilltalk,1][C:13]Jill:[C:C] I loved her, but I don't think I was #ready for such a commitment. Especially #considering what she did.[STOPLIP:]"
l_180 = "[XS:jilltalk,1][C:13]Jill:[C:C] I didn't know what I wanted to do, but #I wasn't going to let her decide such a big #thing for me.[STOPLIP:]"
l_181 = "[XS:jilltalk,1][C:13]Jill:[C:C] I mean, she could be really pushy from #time to time.[STOPLIP:]"
l_182 = "[XS:jilltalk,1][C:13]Jill:[C:C] Like I said, I pretty much passed #college thanks to being with her. And that #was partly because she was so pushy.[STOPLIP:]"
l_183 = "[XS:jilltalk,1][C:13]Jill:[C:C] Even if she had the best intentions, #she could be... abrasive from time to time.[STOPLIP:]"
l_184 = "[XS:jilltalk,1][C:13]Jill:[C:C] And it rained down on me at that #moment.[STOPLIP:]"
l_185 = "[XS:jilltalk,1][C:13]Jill:[C:C] She took it upon herself to make that #choice for me. What would have stopped her #once we'd gotten married?[STOPLIP:]"
l_186 = "[XS:jilltalk,1][C:13]Jill:[C:C] What if she suddenly decided to craft #my life to her needs after marriage?[STOPLIP:]"
l_187 = "[XS:jilltalk,1][C:13]Jill:[C:C] I knew her. She would do it thinking it #was the best for me. But what about my #freedom? My say on the matter?[STOPLIP:]"
l_188 = "[XS:gabytalk,1][C:43]Gaby:[C:C] So that's where you stopped loving #Lenore?[XS:gabytalk,0][STOPLIP:]"
l_189 = "[XS:jilltalk,1][C:13]Jill:[C:C] No! No, no...[STOPLIP:]"
l_190 = "[XS:jilltalk,1][C:13]Jill:[C:C] I never stopped loving her, which is #why it hurt so much. But you have to #understand.[STOPLIP:]"
l_191 = "[XS:jilltalk,1][C:13]Jill:[C:C] I didn't want to wake up 40 years old #and working a job I hate.[STOPLIP:]"
l_192 = "[XS:jilltalk,1][C:13]Jill:[C:C] Just out of routine. Getting used to #it.[STOPLIP:]"
l_193 = "[XS:jilltalk,1][C:13]Jill:[C:C] I wanted a break from everything for a #while to put my thoughts in order.[STOPLIP:]"
l_194 = "[XS:jilltalk,1][C:13]Jill:[C:C] Regroup myself. Think carefully about #what to do next.[STOPLIP:]"
l_195 = "[XS:gabyface,shy][XS:gabytalk,1][C:43]Gaby:[C:C] I can understand. I've sometimes felt the #same, although I'm not even in college.[XS:gabytalk,0][STOPLIP:]"
l_196 = "[XS:gabyface,][XS:gabytalk,1][C:43]Gaby:[C:C] So that's what led to you two fighting, #huh?[XS:gabytalk,0][STOPLIP:]"
l_197 = "[XS:jilltalk,1][C:13]Jill:[C:C] Heh. You know, the word INI_QUOTSfightINI_QUOTS makes #it sound like we exchanged blows or #something.[STOPLIP:]"
l_198 = "[XS:jilltalk,1][C:13]Jill:[C:C] It's all silly when I think back to it. #Tragically silly.[STOPLIP:]"
l_199 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe I was the one who started the #fight, getting all defensive about not #wanting to take that offer.[STOPLIP:]"
l_200 = "[XS:jilltalk,1][C:13]Jill:[C:C] Perhaps if I didn't overreact to her #arguments about wasting this huge #opportunity... [STOPLIP:]"
l_201 = "[XS:jilltalk,1][C:13]Jill:[C:C] Maybe she wouldn't have lashed out at #me this bad.[STOPLIP:]"
