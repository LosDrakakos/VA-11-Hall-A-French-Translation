l_16 = "[XS:danaface,][XS:dantalk,1][C:15]Dana:[C:C] If you get through this, I'll give #you... I don't know, a hug. Does that #work?[XS:dantalk,0][STOPLIP:]"
l_17 = "[XS:jilltalk,1][C:13]Jill:[C:C] A-A hug?[STOPLIP:]"
l_18 = "[XS:dantalk,1][C:15]Dana:[C:C] A big one. A reward for after #everything's said and done.[XS:dantalk,0][STOPLIP:]"
l_19 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_20 = "[XS:dantalk,1][C:15]Dana:[C:C] Gotta go! You can do it![XS:dantalk,0][XS:danhide,1][STOPLIP:]"
l_21 = "[XS:jilltalk,1][C:13]Jill:[C:C] R-Right...[STOPLIP:]"
l_22 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_23 = "[XS:jilltalk,1][C:13]Jill:[C:C] (Everything's fine...)[STOPLIP:]"
l_24 = "[XS:jilltalk,1][C:13]Jill:[C:C] (You've been avoiding this for all #these years, now it's time to face it #head-on.)[STOPLIP:]"
