l_7 = "[XS:jilltalk,1][C:13]Jill:[C:C] ...[STOPLIP:]"
l_8 = "[XS:dantalk,1][C:15]Dana:[C:C] Are you alright?[XS:dantalk,0][STOPLIP:]"
